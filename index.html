      <p style={{fontSize:11.5, color:'var(--ink-faint)', marginTop:12}}>* السجل غير قابل للتعديل أو الحذف — يعرض آخر 300 عملية، والبحث يشمل الكل. سجلات ما قبل تفعيل هذه الميزة غير متاحة.</p>
    </div>
  );
}

/* ================= مركز القيادة المالية ================= */
function buildFccItems(data){
  const items = [];
  const nowYM = currentYM();
  const projOf = (id)=> data.projects.find(p=>p.id===id) || {};
  const pLabel = (p)=> (p.projectNo?p.projectNo+' — ':'')+(p.name||'');

  data.payments.forEach(i=>{
    if(!isArchived(i) && i.projectId && !i.contractId && (i.phase==='تصميم'||i.phase==='إشراف')){
      const p0 = projOf(i.projectId);
      items.push({key:'noc-'+i.id, pr:'med', cat:'فواتير', dot:'🟣', date:i.date,
        text:'دفعة بلا عقد مرتبط — '+pLabel(p0)+' — '+(i.label||i.phase)+' ('+money(i.amount||0)+') — افتحها بزر التعديل واربطها بعقدها',
        actions:[{label:'فتح الدفعات', go:'payments'}]});
    }
    if(remainderOf(i)<=0) return;
    const dd = daysUntil(i.dueDate);
    const p = projOf(i.projectId);
    if(dd!==null && dd<0){
      items.push({key:'ovd-'+i.id, pr:'high', cat:'تحصيلات', dot:'🔴', date:i.dueDate,
        text:'دفعة متأخرة '+Math.abs(dd)+' يوم — '+pLabel(p)+' — متبقٍ '+money(remainderOf(i)*grossFactor(i)),
        actions:[{label:'فتح الدفعات', go:'payments'}]});
    } else if(dd!==null && dd<=7){
      items.push({key:'due-'+i.id, pr:'low', cat:'تحصيلات', dot:'🟢', date:i.dueDate,
        text:'دفعة تستحق خلال '+dd+' يوم — '+pLabel(p)+' ('+money(remainderOf(i)*grossFactor(i))+')',
        actions:[{label:'فتح الدفعات', go:'payments'}]});
    }
  });

  (data.contracts||[]).forEach(c=>{
    if(isArchived(c)) return;
    const p = projOf(c.projectId);
    if(contractHasSupervision(c) && c.status==='سارٍ' && isConsultancy(c) && p.status==='جارٍ' && projectReadyForSupervision(p)){
      const done = data.payments.filter(i=>!isArchived(i) && i.contractId===c.id && i.phase==='إشراف').length;
      if(done < (c.supervisionMonths||0) && !data.payments.some(i=>!isArchived(i) && i.contractId===c.id && i.phase==='إشراف' && i.month===nowYM)){
        items.push({key:'sup-'+c.id+'-'+nowYM, pr:'high', cat:'فواتير', dot:'🔴', date:todayISO(),
          text:'مطلوب إصدار دفعة إشراف '+fmtMonth(nowYM)+' — '+pLabel(p)+' ('+money(c.supervisionMonthly)+')',
          actions:[{label:'⚡ توليد الآن', gen:'supervision', contractId:c.id}]});
      }
    }
    const cm = contractCommission(c);
    if(cm>0){
      const invoiced = data.payments.filter(i=>i.contractId===c.id).reduce((s,i)=>s+(isArchived(i)?0:i.amount),0);
      if(invoiced < cm*0.999){
        items.push({key:'comm-'+c.id, pr:'med', cat:'عقود', dot:'🟡', date:c.date,
          text:'عمولة غير مفوترة '+money(cm-invoiced)+' — عقد '+(c.subType?c.subType+' ':'')+(c.contractor||'')+' — '+pLabel(p),
          actions:[{label:'⚡ توليد دفعة العمولة', gen:'commission', contractId:c.id}]});
      }
    }
    if(isConsultancy(c) && c.type!=='إشراف' && c.status!=='ملغى' && !isArchived(c)){
      const target = isComboContract(c) ? (c.designValue||0) : (c.value||0);
      const billed = data.payments.filter(i=>i.contractId===c.id && i.phase!=='إشراف').reduce((s,i)=>s+(isArchived(i)?0:i.amount),0);
      const stg = (p.timeline||{});
      const designDone = (stg.design&&stg.design.status==='مكتملة');
      if(designDone && billed < target*0.999 && target>0){
        items.push({key:'des-'+c.id, pr:'med', cat:'عقود', dot:'🟣', date:todayISO(),
          text:'التصميم مكتمل ومتبقٍ '+money(target-billed)+' غير مفوتر من عقد — '+pLabel(p),
          actions:[{label:'فتح المشروع', go:'projects'}]});
      }
    }
  });

  data.projects.forEach(p=>{
    const feesOut = data.govFees.filter(g=>g.projectId===p.id && !isArchived(g) && g.payerType!=='المالك مباشرة' && g.paidStatus==='مدفوع' && g.reimburseStatus!=='مسترد').reduce((s,g)=>s+(isArchived(g)?0:g.amount),0);
    if(feesOut>0) items.push({key:'gov-'+p.id, pr:'high', cat:'رسوم حكومية', dot:'⚫', date:todayISO(),
      text:'أمانات '+money(feesOut)+' مدفوعة من خزينتك ولم تُسترد — '+pLabel(p),
      actions:[{label:'فتح الرسوم', go:'govFees'}]});

    const costs = data.projectCosts.filter(e=>e.projectId===p.id).reduce((s,e)=>s+e.amount,0);
    if((p.budgetAmount||0)>0 && costs > p.budgetAmount){
      items.push({key:'bud-'+p.id, pr:'med', cat:'الميزانية', dot:'🔵', date:todayISO(),
        text:'تجاوز الميزانية بـ '+Math.round((costs/p.budgetAmount-1)*100)+'% — '+pLabel(p)+' (التكاليف '+money(costs)+' من '+money(p.budgetAmount)+')',
        actions:[{label:'فتح المشروع', go:'projects'}]});
    }
    const billedP = data.payments.filter(i=>!isArchived(i) && i.projectId===p.id).reduce((s,i)=>s+(isArchived(i)?0:i.amount),0);
    if(p.status==='جارٍ' && billedP>10000){
      const margin = (billedP-costs)/billedP*100;
      if(margin<20) items.push({key:'mrg-'+p.id, pr:'med', cat:'الربحية', dot:'🟠', date:todayISO(),
        text:'هامش الربح انخفض إلى '+margin.toFixed(0)+'% — '+pLabel(p),
        actions:[{label:'فتح التحليلات', go:'analytics'}]});
    }
  });

  data.govFees.filter(g=>!isArchived(g) && g.payerType!=='المالك مباشرة' && g.paidStatus!=='مدفوع').forEach(g=>{
    const p = projOf(g.projectId);
    items.push({key:'govp-'+g.id, pr:'med', cat:'رسوم حكومية', dot:'🟠', date:g.date,
      text:'رسم '+g.department+' غير مسدد للدائرة ('+money(g.amount)+') — '+pLabel(p),
      actions:[{label:'فتح الرسوم', go:'govFees'}]});
  });

  listQuarters().forEach(q=>{
    if(quarterEndDate(q) < todayISO()){
      const dd = daysUntil(quarterDueDate(q));
      if(dd!==null && dd<=30) items.push({key:'vat-'+q, pr:'high', cat:'الضريبة', dot:'🔴', date:quarterDueDate(q),
        text:'إقرار ض.ق.م عن '+quarterLabel(q)+' — '+(dd<0?('متأخر '+Math.abs(dd)+' يوم'):('متبقٍ '+dd+' يوم')),
        actions:[{label:'فتح الضريبة', go:'vat'}]});
    }
  });

  const prOrder = {high:0, med:1, low:2};
  items.sort((a,b)=> prOrder[a.pr]-prOrder[b.pr] || (a.date||'').localeCompare(b.date||''));
  return items;
}

function FccView({data, mutate, go, setFcc}){
  const [prFilter, setPrFilter] = useState('');
  const [catFilter, setCatFilter] = useState('');
  const st = data.fccState || {};
  const all = buildFccItems(data);
  const visible = all.filter(it=>{
    const s = st[it.key];
    if(s && s.done) return false;
    if(s && s.snoozeUntil && s.snoozeUntil >= todayISO()) return false;
    if(prFilter && it.pr!==prFilter) return false;
    if(catFilter && it.cat!==catFilter) return false;
    return true;
  });
  const hiddenCount = all.length - all.filter(it=>{ const s=st[it.key]; return !(s&&(s.done||(s.snoozeUntil&&s.snoozeUntil>=todayISO()))); }).length;
  const cats = [...new Set(all.map(i=>i.cat))];
  const PR_AR = {high:'عاجل', med:'متوسط', low:'قريباً'};
  const PR_CLS = {high:'bad', med:'soon', low:'ok'};

  const mark = (key, patch)=> setFcc({...st, [key]:{...(st[key]||{}), ...patch}});
  const runGen = (it, act)=>{
    const c = (data.contracts||[]).find(x=>x.id===act.contractId);
    if(!c) return;
    const due = new Date(); due.setDate(due.getDate()+10);
    if(act.gen==='supervision'){
      if(data.payments.some(i=>!isArchived(i) && i.contractId===c.id && i.phase==='إشراف' && i.month===currentYM())){
        alert('دفعة إشراف هذا الشهر مولّدة بالفعل لهذا العقد'); return;
      }
      mutate('payments').add({id:uid(), projectId:c.projectId, contractId:c.id, phase:'إشراف', month:currentYM(),
        amount:c.supervisionMonthly, date:todayISO(), dueDate:due.toISOString().slice(0,10), status:'معلقة', _ts:Date.now()});
      alert('تم توليد دفعة الإشراف — تجدها في الدفعات');
    } else if(act.gen==='commission'){
      const cm = contractCommission(c);
      const invoiced = data.payments.filter(i=>i.contractId===c.id).reduce((s,i)=>s+(isArchived(i)?0:i.amount),0);
      mutate('payments').add({id:uid(), projectId:c.projectId, contractId:c.id, phase:'أخرى',
        label:'عمولة الاستشاري — عقد '+(c.subType?c.subType+' ':'')+(c.contractor||''),
        amount:cm-invoiced, taxable:'خاضعة', date:todayISO(), dueDate:due.toISOString().slice(0,10), status:'معلقة', _ts:Date.now()});
      alert('تم توليد دفعة العمولة');
    }
  };

  return (
    <div>
      <div className="grid grid-4" style={{marginBottom:18}}>
        <div className="card"><div className="kpi-label">إجراءات عاجلة</div><div className="kpi-value" style={{color:'var(--rust)'}}>{visible.filter(i=>i.pr==='high').length}</div><div className="kpi-note">تحتاج تصرفاً اليوم</div></div>
        <div className="card"><div className="kpi-label">متوسطة الأولوية</div><div className="kpi-value" style={{color:'var(--amber, #B8860B)'}}>{visible.filter(i=>i.pr==='med').length}</div><div className="kpi-note">هذا الأسبوع</div></div>
        <div className="card"><div className="kpi-label">قادمة</div><div className="kpi-value" style={{color:'var(--teal)'}}>{visible.filter(i=>i.pr==='low').length}</div><div className="kpi-note">للمتابعة</div></div>
        <div className="card"><div className="kpi-label">منجزة / مؤجلة</div><div className="kpi-value">{hiddenCount}</div><div className="kpi-note">مخفاة من القائمة</div></div>
      </div>

      <div className="toolbar" style={{flexWrap:'wrap'}}>
        <div className="section-title" style={{marginBottom:0, flex:1}}><h3>ما الذي يحتاج تصرفاً؟</h3><div className="rule"></div></div>
        <select value={prFilter} onChange={e=>setPrFilter(e.target.value)}
          style={{border:'1px solid var(--line-strong)', borderRadius:4, padding:'7px 10px', fontSize:12.5, background:'#fff'}}>
          <option value="">كل الأولويات</option>
          <option value="high">عاجل</option><option value="med">متوسط</option><option value="low">قريباً</option>
        </select>
        <select value={catFilter} onChange={e=>setCatFilter(e.target.value)}
          style={{border:'1px solid var(--line-strong)', borderRadius:4, padding:'7px 10px', fontSize:12.5, background:'#fff'}}>
          <option value="">كل التصنيفات</option>
          {cats.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
      </div>

      <div className="card">
        {visible.length===0 && <p style={{fontSize:13.5, color:'var(--teal)', margin:0, fontWeight:700}}>✓ لا توجد إجراءات مالية معلقة — كل شيء تحت السيطرة.</p>}
        {visible.map(it=>(
          <div key={it.key} style={{display:'flex', gap:10, alignItems:'flex-start', padding:'12px 0', borderBottom:'1px solid var(--line)', flexWrap:'wrap'}}>
            <span style={{fontSize:15, flexShrink:0}}>{it.dot}</span>
            <div style={{flex:1, minWidth:220}}>
              <div style={{fontSize:13.5}}>{it.text}</div>
              <div style={{fontSize:10.5, color:'var(--ink-faint)', marginTop:3}}>
                <span className={"badge "+PR_CLS[it.pr]} style={{marginInlineEnd:6}}>{PR_AR[it.pr]}</span>
                <span className="badge gray">{it.cat}</span>
              </div>
            </div>
            <div style={{display:'flex', gap:6, flexWrap:'wrap', alignItems:'center'}}>
              {it.actions.map((a,i)=> a.gen
                ? <button key={i} className="btn small brass" onClick={()=>runGen(it, a)}>{a.label}</button>
                : <button key={i} className="btn small outline" onClick={()=>go(a.go)}>{a.label}</button>
              )}
              <button className="btn ghost small" title="تأجيل 3 أيام" onClick={()=>{ const d=new Date(); d.setDate(d.getDate()+3); mark(it.key,{snoozeUntil:d.toISOString().slice(0,10)}); }}>⏰ تأجيل</button>
              <button className="btn ghost small" title="تم" style={{color:'var(--teal)'}} onClick={()=>mark(it.key,{done:true, at:todayISO()})}>✓ تم</button>
            </div>
          </div>
        ))}
      </div>
      <p style={{fontSize:11.5, color:'var(--ink-faint)', marginTop:12}}>* القائمة تتولد تلقائياً من بيانات النظام وتتحدث لحظياً — البنود المنجزة فعلياً (كسداد دفعة) تختفي وحدها، وزر "تم" لإخفاء ما عالجته خارج النظام. "تأجيل" يخفي البند 3 أيام.</p>
    </div>
  );
}

/* ================= التحليلات الذكية ================= */
function AnalyticsView({data}){
  const [lang, setLang] = useState('ar');

  /* --- ربحية المشاريع بالهوامش --- */
  const margins = data.projects.map(p=>{
    const billed = data.payments.filter(i=>!isArchived(i) && i.projectId===p.id).reduce((s,i)=>s+(isArchived(i)?0:i.amount),0);
    const costs = data.projectCosts.filter(e=>e.projectId===p.id).reduce((s,e)=>s+e.amount,0);
    const margin = billed>0 ? (billed-costs)/billed*100 : null;
    return {...p, billed, costs, profit:billed-costs, margin};
  }).filter(r=>r.billed>0).sort((a,b)=>(a.margin??100)-(b.margin??100));

  /* --- توقع التدفق النقدي 3 أشهر --- */
  const {bank, cash} = computeCashFlows(data);
  const startBal = bank+cash;
  const now = new Date();
  const next3 = [1,2,3].map(k=>{ const d=new Date(now.getFullYear(), now.getMonth()+k, 1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); });
  const avgOver = (arr, months)=>{
    const sums = months.map(m=> arr.filter(e=>monthKey(e.date)===m).reduce((s,e)=>s+e.amount,0));
    return sums.reduce((s,v)=>s+v,0)/months.length;
  };
  const prev3 = [1,2,3].map(k=>{ const d=new Date(now.getFullYear(), now.getMonth()-k, 1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); });
  const avgOffice = avgOver(data.officeExpenses, prev3)*1.05;
  const avgProjCosts = avgOver(data.projectCosts, prev3)*1.05;
  const payrollNow = computePayroll(data, currentYM()).totalNet;
  let running = startBal;
  const forecast = next3.map(m=>{
    const scheduled = data.payments.filter(i=> remainderOf(i)>0 && monthKey(i.dueDate)===m).reduce((s,i)=>s+remainderOf(i)*grossFactor(i),0);
    const supervision = (data.contracts||[]).filter(c=> contractHasSupervision(c) && c.status==='سارٍ' && isConsultancy(c))
      .filter(c=>{
        const proj = data.projects.find(p=>p.id===c.projectId);
        if(!proj || proj.status!=='جارٍ' || !projectReadyForSupervision(proj)) return false;
        const done = data.payments.filter(i=>!isArchived(i) && i.contractId===c.id && i.phase==='إشراف').length;
        return done < (c.supervisionMonths||0) && !data.payments.some(i=>i.contractId===c.id && i.month===m);
      }).reduce((s,c)=>s+(c.supervisionMonthly||0)*1.05,0);
    const inflow = scheduled + supervision;
    const outflow = avgOffice + avgProjCosts + payrollNow;
    running += inflow - outflow;
    return {m, inflow, outflow, net:inflow-outflow, balance:running};
  });

  /* --- مصروفات غير طبيعية --- */
  const nowYM = currentYM();
  const catTotals = (arr, m)=>{
    const t={}; arr.filter(e=>monthKey(e.date)===m).forEach(e=>{ t[e.category]=(t[e.category]||0)+e.amount; }); return t;
  };
  const anomalies = [];
  [['مصروفات المكتب', data.officeExpenses],['تكاليف المشاريع', data.projectCosts]].forEach(([label, arr])=>{
    const cur = catTotals(arr, nowYM);
    Object.entries(cur).forEach(([cat, amt])=>{
      const avg = prev3.reduce((s,m)=> s + (catTotals(arr,m)[cat]||0), 0)/3;
      if(amt>500 && avg>0 && amt > avg*1.5){
        anomalies.push({label, cat, amt, avg, pct: Math.round((amt/avg-1)*100)});
      } else if(amt>2000 && avg===0){
        anomalies.push({label, cat, amt, avg:0, pct:null});
      }
    });
  });

  /* --- اقتراحات الفوترة --- */
  const suggestions = [];
  (data.contracts||[]).filter(c=> contractHasSupervision(c) && c.status==='سارٍ' && isConsultancy(c)).forEach(c=>{
    const proj = data.projects.find(p=>p.id===c.projectId);
    if(!proj || proj.status!=='جارٍ' || !projectReadyForSupervision(proj)) return;
    const done = data.payments.filter(i=>!isArchived(i) && i.contractId===c.id && i.phase==='إشراف').length;
    if(done < (c.supervisionMonths||0) && !data.payments.some(i=>i.contractId===c.id && i.month===nowYM)){
      suggestions.push('إصدار فاتورة إشراف '+fmtMonth(nowYM)+' لمشروع '+(proj.projectNo||'')+' '+proj.name+' ('+money(c.supervisionMonthly)+') — زر التوليد في قسم الدفعات');
    }
  });
  (data.contracts||[]).filter(c=> c.status!=='ملغى' && !isArchived(c) && isConsultancy(c) && c.type!=='إشراف').map(c=> isComboContract(c) ? {...c, value:(c.designValue||0)} : c).forEach(c=>{
    const proj = data.projects.find(p=>p.id===c.projectId);
    if(!proj) return;
    const billed = data.payments.filter(i=>i.contractId===c.id).reduce((s,i)=>s+(isArchived(i)?0:i.amount),0);
    const stg = (proj.timeline||{});
    const designDone = (stg.design&&stg.design.status==='مكتملة') || (stg.detailed&&stg.detailed.status==='مكتملة');
    if(designDone && billed < (c.value||0)*0.999){
      suggestions.push('مشروع '+(proj.projectNo||'')+' '+proj.name+': مرحلة التصميم مكتملة والمفوتر '+money(billed)+' من '+money(c.value)+' — متبقٍ '+money((c.value||0)-billed)+' يُنصح بفوترته');
    }
  });

  /* --- التقرير الشهري ثنائي اللغة --- */
  const ymNow = currentYM();
  const rev = data.payments.filter(i=>monthKey(i.date)===ymNow).reduce((s,i)=>s+(isArchived(i)?0:i.amount),0);
  const offM = data.officeExpenses.filter(e=>monthKey(e.date)===ymNow).reduce((s,e)=>s+e.amount,0);
  const pcM = data.projectCosts.filter(e=>monthKey(e.date)===ymNow).reduce((s,e)=>s+e.amount,0);
  const netM = rev - offM - pcM - payrollNow;
  const recv = data.projects.reduce((s,p)=> s + data.payments.filter(i=>!isArchived(i) && i.projectId===p.id).reduce((x,i)=>x+remainderOf(i)*grossFactor(i),0), 0);
  const amanat = data.govFees.filter(g=>!isArchived(g) && g.payerType!=='المالك مباشرة' && g.paidStatus==='مدفوع' && g.reimburseStatus!=='مسترد').reduce((s,g)=>s+(isArchived(g)?0:g.amount),0);
  const T = lang==='ar' ? {
    rpt:'التقرير الشهري — الإدارة المالية', period:'الفترة', rev:'الإيرادات الاستشارية المفوترة', off:'مصروفات المكتب', pc:'تكاليف المشاريع المباشرة',
    pay:'صافي الرواتب', net:'صافي الشهر (تقديري)', liq:'السيولة الحالية (بنك + خزينة)', recv:'مستحقات لدى العملاء', amn:'أمانات لم تُسترد',
    proj:'المشاريع الجارية', print:'طباعة التقرير', sw:'English'
  } : {
    rpt:'Monthly Report — Financial Management', period:'Period', rev:'Billed Consultancy Revenue', off:'Office Expenses', pc:'Direct Project Costs',
    pay:'Net Payroll', net:'Month Net (Estimate)', liq:'Current Liquidity (Bank + Cash)', recv:'Client Receivables', amn:'Unrecovered Deposits',
    proj:'Active Projects', print:'Print Report', sw:'العربية'
  };

  return (
    <div>
      <div className="grid grid-4" style={{marginBottom:18}}>
        <div className="card"><div className="kpi-label">أدنى هامش ربح</div><div className="kpi-value" style={{fontSize:19, color:(margins[0]&&margins[0].margin<20)?'var(--rust)':'var(--teal)'}}>{margins[0]&&margins[0].margin!==null?margins[0].margin.toFixed(0)+'%':'—'}</div><div className="kpi-note">{margins[0]?margins[0].name:''}</div></div>
        <div className="card"><div className="kpi-label">الرصيد المتوقع بعد 3 أشهر</div><div className="kpi-value" style={{fontSize:19, color:forecast[2]&&forecast[2].balance>=0?'var(--teal)':'var(--rust)'}}>{forecast[2]?money(forecast[2].balance):'—'}</div><div className="kpi-note">من {money(startBal)} حالياً</div></div>
        <div className="card"><div className="kpi-label">مصروفات غير طبيعية</div><div className="kpi-value" style={{fontSize:19, color:anomalies.length?'var(--rust)':'var(--teal)'}}>{anomalies.length}</div><div className="kpi-note">هذا الشهر مقابل متوسط 3 أشهر</div></div>
        <div className="card"><div className="kpi-label">اقتراحات فوترة</div><div className="kpi-value" style={{fontSize:19, color:'var(--brass)'}}>{suggestions.length}</div><div className="kpi-note">فرص تحصيل جاهزة</div></div>
      </div>

      {(()=>{
        const consCons = (data.contracts||[]).filter(c=> c.status!=='ملغى' && !isArchived(c) && isConsultancy(c));
        const contracted = consCons.reduce((s,c)=>s+contractTotalOf(c),0)
          + (data.contracts||[]).filter(c=>c.category&&c.category!=='خدمات استشارية').reduce((s,c)=>s+contractCommission(c),0);
        const invoiced = data.payments.reduce((s,i)=>s+(isArchived(i)?0:i.amount),0);
        const uninvoiced = Math.max(0, contracted - invoiced);
        const collected = data.payments.reduce((s,i)=>s+collectedOf(i)*grossFactor(i),0);
        const outstanding = data.payments.reduce((s,i)=>s+remainderOf(i)*grossFactor(i),0);
        const horizon = (days)=>{
          const lim = new Date(); lim.setDate(lim.getDate()+days);
          const limS = lim.toISOString().slice(0,10);
          return data.payments.filter(i=>remainderOf(i)>0 && i.dueDate && i.dueDate<=limS).reduce((s,i)=>s+remainderOf(i)*grossFactor(i),0);
        };
        return (
          <div>
            <div className="section-title"><h3 style={{fontSize:13.5}}>خط الإيرادات — من التعاقد إلى التحصيل</h3><div className="rule"></div></div>
            <div className="grid grid-4" style={{marginBottom:10}}>
              <div className="card"><div className="kpi-label">إجمالي المتعاقد عليه</div><div className="kpi-value" style={{fontSize:18}}>{money(contracted)}</div><div className="kpi-note">عقود استشارية + عمولات المقاولين</div></div>
              <div className="card"><div className="kpi-label">المفوتر / غير المفوتر</div><div className="kpi-value" style={{fontSize:18}}>{money(invoiced)}</div><div className="kpi-note" style={{color:uninvoiced>0?'var(--rust)':'var(--ink-faint)'}}>متبقٍ بلا فوترة: {money(uninvoiced)}</div></div>
              <div className="card"><div className="kpi-label">المحصّل (شامل الضريبة)</div><div className="kpi-value" style={{fontSize:18, color:'var(--teal)'}}>{money(collected)}</div><div className="kpi-note">مستحق غير محصّل: {money(outstanding)}</div></div>
              <div className="card"><div className="kpi-label">تحصيلات متوقعة</div><div className="kpi-value" style={{fontSize:15}}>{money(horizon(30))}</div><div className="kpi-note">خلال 30 يوم · 60: {money(horizon(60))} · 90: {money(horizon(90))}</div></div>
            </div>
            {(()=>{
              const done = data.payments.filter(i=>!isArchived(i) && i.paidDate && i.date && collectedOf(i)>0);
              const dso = done.length ? Math.round(done.reduce((s,i)=>{
                const d = (new Date(i.paidDate) - new Date(i.date))/86400000;
                return s + Math.max(0, d);
              },0)/done.length) : null;
              const outs = data.payments.filter(i=>remainderOf(i)>0 && i.dueDate);
              let wSum=0, wTot=0;
              outs.forEach(i=>{
                const age = Math.max(0, -(daysUntil(i.dueDate)||0));
                const w = remainderOf(i)*grossFactor(i);
                wSum += age*w; wTot += w;
              });
              const arAge = wTot>0 ? Math.round(wSum/wTot) : null;
              return (
                <p style={{fontSize:11.5, color:'var(--ink-faint)', marginBottom:22}}>
                  * قيم عقود المقاولين نفسها خارج هذا الخط بالكامل — تدخل عمولاتها فقط.
                  {dso!==null && <span> · <b style={{color:'var(--ink-soft)'}}>متوسط أيام التحصيل (DSO): {dso} يوم</b> من تاريخ الفاتورة للاستلام</span>}
                  {arAge!==null && <span> · <b style={{color: arAge>30 ? 'var(--rust)' : 'var(--ink-soft)'}}>متوسط تأخر الذمم القائمة: {arAge} يوم</b> (مرجّح بالمبالغ)</span>}
                </p>
              );
            })()}
          </div>
        );
      })()}

      <div className="section-title"><h3 style={{fontSize:13.5}}>هوامش ربح المشاريع (الأقل أولاً)</h3><div className="rule"></div></div>
      <div className="card" style={{padding:0, marginBottom:22}}>
        <table>
          <thead><tr><th>المشروع</th><th>المفوتر</th><th>التكاليف المباشرة</th><th>الربح</th><th>الهامش</th></tr></thead>
          <tbody>
            {margins.length===0 && <tr className="empty-row"><td colSpan={5}>لا بيانات كافية</td></tr>}
            {margins.map(r=>(
              <tr key={r.id}>
                <td>{(r.projectNo?r.projectNo+' — ':'')+r.name}</td>
                <td>{money(r.billed)}</td>
                <td>{money(r.costs)}</td>
                <td style={{color:r.profit>=0?'var(--teal)':'var(--rust)', fontWeight:700}}>{money(r.profit)}</td>
                <td>{r.margin!==null ? <span className={"badge "+(r.margin<20?'bad':r.margin<40?'soon':'ok')}>{r.margin.toFixed(0)}%</span> : '—'}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="section-title"><h3 style={{fontSize:13.5}}>توقع التدفق النقدي — الأشهر الثلاثة القادمة</h3><div className="rule"></div></div>
      <div className="card" style={{padding:0, marginBottom:8}}>
        <table>
          <thead><tr><th>الشهر</th><th>وارد متوقع</th><th>صادر متوقع</th><th>الصافي</th><th>الرصيد التراكمي</th></tr></thead>
          <tbody>
            {forecast.map(f=>(
              <tr key={f.m}>
                <td>{fmtMonth(f.m)}</td>
                <td style={{color:'var(--teal)'}}>{money(f.inflow)}</td>
                <td style={{color:'var(--rust)'}}>{money(f.outflow)}</td>
                <td style={{fontWeight:700, color:f.net>=0?'var(--teal)':'var(--rust)'}}>{money(f.net)}</td>
                <td style={{fontWeight:800, color:f.balance>=0?'var(--ink)':'var(--rust)'}}>{money(f.balance)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <p style={{fontSize:11.5, color:'var(--ink-faint)', marginBottom:22}}>* الوارد = الدفعات المستحقة حسب تواريخها + دفعات الإشراف الشهرية للعقود السارية. الصادر = متوسط مصروفات آخر 3 أشهر + رواتب الشهر الحالي. توقع استرشادي وليس التزاماً.</p>

      <div className="grid grid-2" style={{marginBottom:22}}>
        <div className="card">
          <div className="section-title"><h3>مصروفات غير طبيعية هذا الشهر</h3><div className="rule"></div></div>
          {anomalies.length===0 && <p style={{fontSize:12.5, color:'var(--ink-faint)'}}>لا توجد مصروفات شاذة — الإنفاق ضمن النمط المعتاد.</p>}
          {anomalies.map((a,i)=>(
            <div className="alert-item" key={i}>
              <span>{a.label} — {a.cat}: {money(a.amt)} {a.pct!==null ? '(أعلى من المتوسط بـ '+a.pct+'%)' : '(بند جديد غير معتاد)'}</span>
              <span className="badge bad">راجِع</span>
            </div>
          ))}
        </div>
        <div className="card">
          <div className="section-title"><h3>اقتراحات إصدار الفواتير</h3><div className="rule"></div></div>
          {suggestions.length===0 && <p style={{fontSize:12.5, color:'var(--ink-faint)'}}>لا توجد اقتراحات حالياً — الفوترة مواكبة للإنجاز.</p>}
          {suggestions.map((s,i)=>(
            <div className="alert-item" key={i}>
              <span>{s}</span>
              <span className="badge soon">فوترة</span>
            </div>
          ))}
        </div>
      </div>

      <div className="toolbar">
        <div className="section-title" style={{marginBottom:0, flex:1}}><h3 style={{fontSize:13.5}}>{T.rpt}</h3><div className="rule"></div></div>
        <button className="btn outline no-print" onClick={()=>setLang(lang==='ar'?'en':'ar')}>{T.sw}</button>
        <button className="btn brass no-print" onClick={()=>window.print()}><I.print/> {T.print}</button>
      </div>
      <div className="doc" dir={lang==='ar'?'rtl':'ltr'}>
        <div className="doc-head">
          <div className="doc-brand">
            <img src={NITAQ_LOGO} alt="نطاق" style={{height:56}} />
            <div>
              <h1>{lang==='ar'?COMPANY.nameAr:COMPANY.nameEn}</h1>

        <div className="doc-body">
          <table>

              <tr><td>{T.rev}</td><td style={{textAlign:'left'}}>{money(rev)}</td></tr>

/* ================= Reports View ================= */
function ReportsView({data}){
  const [fromYm, setFromYm] = useState(currentYM());
  const [toYm, setToYm] = useState(currentYM());
  const inRange = (d)=>{ const k=monthKey(d); return k>=fromYm && k<=toYm; };
  const monthsInRange = (()=>{
    const arr=[]; let [y,m]=fromYm.split('-').map(Number);
    const [ty,tm]=toYm.split('-').map(Number);
    let guard=0;
    while((y<ty || (y===ty && m<=tm)) && guard<120){ arr.push(y+'-'+String(m).padStart(2,'0')); m++; if(m>12){m=1;y++;} guard++; }
    return arr;
  })();
  const payIn = data.payments.filter(i=>inRange(i.date));
  const designRev = payIn.filter(p=>p.phase==='تصميم').reduce((s,i)=>s+(isArchived(i)?0:i.amount),0);
  const supervRev = payIn.filter(p=>p.phase==='إشراف').reduce((s,i)=>s+(isArchived(i)?0:i.amount),0);
  const otherRev = payIn.filter(p=>p.phase==='أخرى').reduce((s,i)=>s+(isArchived(i)?0:i.amount),0);
  const projCostsM = data.projectCosts.filter(e=>inRange(e.date)).reduce((s,e)=>s+e.amount,0);
  const officeM = data.officeExpenses.filter(e=>inRange(e.date)).reduce((s,e)=>s+e.amount,0);
  const payrollCost = monthsInRange.reduce((s,m)=>s+computePayroll(data,m).totalNet,0);
  const gross = designRev + supervRev + otherRev - projCostsM;
  const net = gross - officeM - payrollCost;
  const rangeLabel = fromYm===toYm ? fmtMonth(fromYm) : ('من '+fmtMonth(fromYm)+' إلى '+fmtMonth(toYm));

  const projRows = useMemo(()=> data.projects.map(p=>{
    const dPaid = data.payments.filter(i=>!isArchived(i) && i.projectId===p.id && i.phase==='تصميم').reduce((s,i)=>s+(isArchived(i)?0:i.amount),0);
    const sPaid = data.payments.filter(i=>!isArchived(i) && i.projectId===p.id && i.phase==='إشراف').reduce((s,i)=>s+(isArchived(i)?0:i.amount),0);
    const oPaid = data.payments.filter(i=>!isArchived(i) && i.projectId===p.id && i.phase==='أخرى').reduce((s,i)=>s+(isArchived(i)?0:i.amount),0);
    const sCount = data.payments.filter(i=>!isArchived(i) && i.projectId===p.id && i.phase==='إشراف').length;
    const spent = data.projectCosts.filter(e=>e.projectId===p.id).reduce((s,e)=>s+e.amount,0);
    const cons = (data.contracts||[]).filter(c=>c.projectId===p.id && c.status!=='ملغى' && !isArchived(c) && (isConsultancy(c)));
    const contract = cons.length>0
      ? cons.reduce((s,c)=> s + contractTotalOf(c), 0)
      : (p.designFee||0) + (p.supervisionMonthly||0)*(p.supervisionMonths||0);
    const supMonths = cons.filter(c=>contractHasSupervision(c)).reduce((s,c)=>s+(c.supervisionMonths||0),0) || (p.supervisionMonths||0);
    return {...p, dPaid, sPaid, oPaid, sCount, spent, contract, supMonths, profit:dPaid+sPaid+oPaid-spent};
  }), [data.projects, data.payments, data.projectCosts, data.contracts]);

  const govRows = data.projects.map(p=>{
    const fees = data.govFees.filter(g=>g.projectId===p.id);
    const total = fees.reduce((s,g)=>s+(isArchived(g)?0:g.amount),0);
    const paid = fees.filter(g=>g.paidStatus==='مدفوع').reduce((s,g)=>s+(isArchived(g)?0:g.amount),0);
    const reimb = fees.filter(g=>g.reimburseStatus==='مسترد').reduce((s,g)=>s+(isArchived(g)?0:g.amount),0);
    const outst = fees.filter(g=>!isArchived(g) && g.payerType!=='المالك مباشرة' && g.paidStatus==='مدفوع' && g.reimburseStatus!=='مسترد').reduce((s,g)=>s+(isArchived(g)?0:g.amount),0);
    return {...p, total, paid, reimb, outst, count:fees.length};
  }).filter(r=>r.count>0);

  return (
    <div>
      <div className="toolbar">
        <div className="section-title" style={{marginBottom:0, flex:1}}><h3>التقارير المالية</h3><div className="rule"></div></div>
        <div style={{display:'flex', gap:10, alignItems:'center', flexWrap:'wrap'}}>
          <span style={{fontSize:12, color:'var(--ink-soft)'}}>من</span>
          <input type="month" value={fromYm} onChange={e=>setFromYm(e.target.value)} />
          <span style={{fontSize:12, color:'var(--ink-soft)'}}>إلى</span>
          <input type="month" value={toYm} onChange={e=>setToYm(e.target.value)} />
          <button className="btn outline no-print" onClick={()=>window.print()}><I.print/> طباعة</button>
        </div>
      </div>

      <div className="section-title"><h3 style={{fontSize:13.5}}>قائمة الدخل — {rangeLabel}</h3><div className="rule"></div></div>
      <div className="card" style={{marginBottom:24}}>
        <table>
          <tbody>
            <tr><td>إيرادات التصميم واعتماد المخططات</td><td style={{textAlign:'left'}}>{money(designRev)}</td></tr>
            <tr><td>إيرادات الإشراف الشهري</td><td style={{textAlign:'left'}}>{money(supervRev)}</td></tr>
            <tr><td>إيرادات رسوم أخرى (فحوصات وخدمات خارجية)</td><td style={{textAlign:'left'}}>{money(otherRev)}</td></tr>
            <tr><td>تكاليف المشاريع المباشرة</td><td style={{textAlign:'left'}}>−{money(projCostsM)}</td></tr>
            <tr style={{fontWeight:700}}><td>مجمل الربح</td><td style={{textAlign:'left'}}>{money(gross)}</td></tr>
            <tr><td>مصروفات المكتب العمومية</td><td style={{textAlign:'left'}}>−{money(officeM)}</td></tr>
            <tr><td>صافي الرواتب للفترة (وفق كشف الرواتب الفعلي)</td><td style={{textAlign:'left'}}>−{money(payrollCost)}</td></tr>
            <tr style={{fontWeight:800, fontSize:15}}><td>صافي الربح / الخسارة</td><td style={{textAlign:'left', color:net>=0?'var(--teal)':'var(--rust)'}}>{money(net)}</td></tr>
          </tbody>
        </table>
        <p style={{fontSize:11.5, color:'var(--ink-faint)', marginTop:10, marginBottom:0}}>* الرسوم الحكومية أمانات لا تظهر ضمن الإيرادات أو المصروفات.</p>
      </div>

      <div className="section-title"><h3 style={{fontSize:13.5}}>ربحية المشاريع (تراكمي)</h3><div className="rule"></div></div>
      <div className="card" style={{padding:0, marginBottom:24}}>
        <div style={{overflowX:'auto'}}>
        <table>
          <thead><tr><th>المشروع</th><th>قيمة العقد</th><th>محصّل التصميم</th><th>محصّل الإشراف</th><th>رسوم أخرى</th><th>تقدم الإشراف</th><th>تكاليف مباشرة</th><th>الربح</th></tr></thead>
          <tbody>
            {projRows.map(p=>(
              <tr key={p.id}>
                <td>{(p.projectNo?p.projectNo+' — ':'')+p.name}</td>
                <td>{money(p.contract)}</td>
                <td>{money(p.dPaid)}</td>
                <td>{money(p.sPaid)}</td>
                <td>{money(p.oPaid)}</td>
                <td>{p.supMonths>0 ? (
                  <span>
                    {p.sCount} من {p.supMonths} شهر
                    <div className="progress" style={{width:70}}><div style={{width:Math.min(100,(p.sCount/p.supMonths)*100)+'%'}}></div></div>
                  </span>
                ) : '—'}</td>
                <td>{money(p.spent)}</td>
                <td style={{color:p.profit>=0?'var(--teal)':'var(--rust)', fontWeight:700}}>{money(p.profit)}</td>
              </tr>
            ))}
          </tbody>
        </table>
        </div>
      </div>

      <div className="section-title"><h3 style={{fontSize:13.5}}>الرسوم الحكومية حسب المشروع (أمانات)</h3><div className="rule"></div></div>
      <div className="card" style={{padding:0}}>
        <table>
          <thead><tr><th>المشروع</th><th>إجمالي الرسوم</th><th>مدفوع للدوائر</th><th>مسترد من العميل</th><th>معلق الاسترداد</th></tr></thead>
          <tbody>
            {govRows.length===0 && <tr className="empty-row"><td colSpan={5}>لا توجد رسوم حكومية مسجلة</td></tr>}
            {govRows.map(r=>(
              <tr key={r.id}>
                <td>{r.name}</td>
                <td>{money(r.total)}</td>
                <td>{money(r.paid)}</td>
                <td>{money(r.reimb)}</td>
                <td style={{color:r.outst>0?'var(--rust)':'var(--teal)', fontWeight:700}}>{money(r.outst)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ================= Payroll View ================= */
function PayrollView({data, mutate}){
  const [ym, setYm] = useState(currentYM());
  const {rows, totalNet} = computePayroll(data, ym);
  const mT = mutate('treasury');

  const paidRec = data.treasury.find(t=>t.kind==='رواتب' && t.month===ym);
  const paySalaries = () => {
    if(paidRec){ alert('تم تسجيل صرف رواتب '+fmtMonth(ym)+' مسبقاً'); return; }
    if(!confirm('تسجيل صرف رواتب '+fmtMonth(ym)+' بإجمالي '+money(totalNet)+' من حساب البنك؟')) return;
    mT.add({id:uid(), type:'صرف', account:'البنك', amount:totalNet, date:todayISO(),
      note:'صرف رواتب '+fmtMonth(ym), kind:'رواتب', month:ym, _ts:Date.now()});
  };

  const grats = data.employees.map(e=>({e, ...computeGratuity(e)}));
  const gratTotal = grats.reduce((s,g)=>s+(isArchived(g)?0:g.amount),0);

  return (
    <div>
      <div className="toolbar">
        <div className="section-title" style={{marginBottom:0, flex:1}}><h3>كشف الرواتب</h3><div className="rule"></div></div>
        <div style={{display:'flex', gap:10}}>
          <input type="month" value={ym} onChange={e=>setYm(e.target.value)} />
          <button className={"btn "+(paidRec?'outline':'brass')+" no-print"} onClick={paySalaries}>
            {paidRec ? '✓ رواتب الشهر مصروفة' : 'تسجيل صرف الرواتب'}
          </button>
          <button className="btn outline no-print" onClick={()=>window.print()}><I.print/> طباعة</button>
        </div>
      </div>
      <div className="card" style={{padding:0, marginBottom:16}}>
        <table>
          <thead>
            <tr>
              <th>الموظف</th><th>الراتب الأساسي</th><th>أيام غياب</th><th>خصم الغياب</th>
              <th>الأوفرتايم</th><th>سلف</th><th>خصومات</th><th>الصافي</th>
            </tr>
          </thead>
          <tbody>
            {rows.map(r=>(
              <tr key={r.emp.id}>
                <td>{r.emp.name}</td>
                <td>{money(r.emp.baseSalary)}</td>
                <td>{r.absentDays}</td>
                <td>−{money(r.absenceDeduction)}</td>
                <td>+{money(r.ot)}</td>
                <td>−{money(r.advances)}</td>
                <td>−{money(r.deductions)}</td>
                <td style={{fontWeight:800}}>{money(r.net)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="card grid grid-4" style={{padding:16, marginBottom:24}}>
        <div><div className="kpi-label">عدد الموظفين</div><div className="kpi-value" style={{fontSize:20}}>{data.employees.length}</div></div>
        <div><div className="kpi-label">إجمالي الرواتب الأساسية</div><div className="kpi-value" style={{fontSize:20}}>{money(data.employees.reduce((s,e)=>s+e.baseSalary,0))}</div></div>
        <div><div className="kpi-label">إجمالي الأوفرتايم</div><div className="kpi-value" style={{fontSize:20}}>{money(rows.reduce((s,r)=>s+r.ot,0))}</div></div>
        <div><div className="kpi-label">إجمالي صافي الرواتب</div><div className="kpi-value" style={{fontSize:20, color:'var(--brass)'}}>{money(totalNet)}</div></div>
      </div>

      <div className="section-title"><h3 style={{fontSize:13.5}}>مخصص مكافأة نهاية الخدمة (تقديري — التزام متراكم)</h3><div className="rule"></div></div>
      <div className="card" style={{padding:0}}>
        <table>
          <thead><tr><th>الموظف</th><th>تاريخ التعيين</th><th>مدة الخدمة</th><th>المكافأة المستحقة حتى اليوم</th></tr></thead>
          <tbody>
            {grats.map(g=>(
              <tr key={g.e.id}>
                <td>{g.e.name}</td>
                <td>{g.e.hireDate||'—'}</td>
                <td>{g.years.toFixed(1)} سنة</td>

              </tr>
            ))}

              <td colSpan={3}>إجمالي الالتزام المتراكم</td>

/* ================= Dashboard ================= */
function Dashboard({data, go}){
  const totalRevenue = data.payments.reduce((s,i)=>s+(isArchived(i)?0:i.amount),0);
  const totalExpenses = data.officeExpenses.reduce((s,e)=>s+e.amount,0) + data.projectCosts.reduce((s,e)=>s+e.amount,0);
  const govOutstanding = data.govFees.filter(g=>!isArchived(g) && g.payerType!=='المالك مباشرة' && g.paidStatus==='مدفوع' && g.reimburseStatus!=='مسترد').reduce((s,g)=>s+(isArchived(g)?0:g.amount),0);
  const activeProjects = data.projects.filter(p=>p.status==='جارٍ').length;

  const months = last6Months();
  const chartData = months.map(m=>({
    m,
    rev: data.payments.filter(i=>monthKey(i.date)===m).reduce((s,i)=>s+(isArchived(i)?0:i.amount),0),
    exp: data.officeExpenses.filter(e=>monthKey(e.date)===m).reduce((s,e)=>s+e.amount,0)
       + data.projectCosts.filter(e=>monthKey(e.date)===m).reduce((s,e)=>s+e.amount,0),
  }));
  const maxVal = Math.max(1,...chartData.flatMap(d=>[d.rev,d.exp]));

  const nowYM = currentYM();
  const alerts = useMemo(()=>{
    const alerts = [];
    data.projects.filter(p=>p.status==='جارٍ' && (p.supervisionMonthly||0)>0).forEach(p=>{
    const has = data.payments.some(i=>i.projectId===p.id && i.phase==='إشراف' && i.month===nowYM);
    const done = data.payments.filter(i=>!isArchived(i) && i.projectId===p.id && i.phase==='إشراف').length;
    if(!has && done < (p.supervisionMonths||0)){
      alerts.push({text:'دفعة إشراف '+fmtMonth(nowYM)+' لمشروع "'+p.name+'" لم تُسجل بعد', status:'soon', go:'payments'});
    }
  });
  data.payments.forEach(i=>{
    if(remainderOf(i)>0){
      const d = daysUntil(i.dueDate);
      if(d!==null && d<0) alerts.push({text:'دفعة متأخرة — '+((data.projects.find(p=>p.id===i.projectId)||{}).name||'')+' — متبقٍ '+money(remainderOf(i)*grossFactor(i))+' وتجاوزت الاستحقاق بـ '+Math.abs(d)+' يوم', status:'bad', go:'payments'});
    }
  });
  data.projects.filter(p=>p.status==='جارٍ').forEach(p=>{
    TIMELINE_STAGES.forEach(st=>{
      const s = (p.timeline||{})[st.key];
      if(s && s.status==='جارية' && s.startDate && s.targetDays && daysSince(s.startDate) > s.targetDays){
        const emp = (data.employees.find(e=>e.id===s.responsibleId)||{}).name || ((data.staffDir||[]).find(x=>x.empId===s.responsibleId)||{}).name || s.responsibleId;
        alerts.push({text:'مرحلة "'+st.label+'" — مشروع '+(p.projectNo||'')+' '+p.name+': تجاوزت المدة المستهدفة بـ '+(daysSince(s.startDate)-s.targetDays)+' يوم'+(emp?' (المسؤول: '+emp+')':''), status:'bad', go:'projects'});
      }
    });
    APPROVAL_ITEMS.forEach(name=>{
      const a = (p.approvals||{})[name];
      if(a && !a.done && a.submitDate && a.targetDays && daysSince(a.submitDate) > a.targetDays){
        const emp = (data.employees.find(e=>e.id===a.responsibleId)||{}).name || ((data.staffDir||[]).find(x=>x.empId===a.responsibleId)||{}).name || a.responsibleId;
        alerts.push({text:'اعتماد "'+name+'" — مشروع '+(p.projectNo||'')+': مقدَّم منذ '+daysSince(a.submitDate)+' يوم وتجاوز المتوقع بـ '+(daysSince(a.submitDate)-a.targetDays)+' يوم'+(emp?' (المسؤول: '+emp+')':''), status:'bad', go:'projects'});
      }
    });
    const billedP = data.payments.filter(i=>!isArchived(i) && i.projectId===p.id).reduce((s,i)=>s+(isArchived(i)?0:i.amount),0);
    const costsP = data.projectCosts.filter(e=>e.projectId===p.id).reduce((s,e)=>s+e.amount,0);
    if(billedP>10000){
      const margin = (billedP-costsP)/billedP*100;
      if(margin<20) alerts.push({text:'هامش ربح مشروع '+(p.projectNo||'')+' '+p.name+' انخفض إلى '+margin.toFixed(0)+'% — راجع التكاليف المباشرة', status:'soon', go:'analytics'});
    }
  });
  listQuarters().forEach(q=>{
    if(quarterEndDate(q) < todayISO()){
      const due = quarterDueDate(q);
      const dd = daysUntil(due);
      if(dd!==null && dd<=30) alerts.push({
        text:'إقرار ض.ق.م عن فترة '+quarterLabel(q)+' — '+(dd<0 ? ('تجاوز الاستحقاق بـ '+Math.abs(dd)+' يوم') : ('مستحق خلال '+dd+' يوم ('+due+')')),
        status: dd<0?'bad':'soon', go:'vat'});
    }
  });
  if(govOutstanding>0){
    alerts.push({text:'رسوم حكومية بقيمة '+money(govOutstanding)+' مدفوعة من خزينة المكتب ولم تُسترد من العملاء', status:'bad', go:'govFees'});
  }
  data.employees.forEach(e=>{
    [['iqamaExpiry','إقامة'],['passportExpiry','جواز سفر'],['workCardExpiry','بطاقة عمل']].forEach(([field,label])=>{
      const d = daysUntil(e[field]);
      if(d!==null && d<=60) alerts.push({text:label+' '+e.name+' — '+expiryLabel(e[field]), status: d<0?'bad':'soon', go:'employees'});
    });
  });
    data.cars.forEach(c=>{
      const d = daysUntil(c.licenseExpiry);
      if(d!==null && d<=60) alerts.push({text:'رخصة سيارة '+c.model+' ('+c.plate+') — '+expiryLabel(c.licenseExpiry), status: d<0?'bad':'soon', go:'cars'});
    });
    return alerts;
  }, [data]);

  return (
    <div>
      <div className="grid grid-4" style={{marginBottom:18}}>
        <div className="card"><div className="kpi-label">الإيرادات الاستشارية <I.receipt style={{width:15,height:15,color:'var(--ink-faint)'}}/></div>
          <div className="kpi-value">{money(totalRevenue)}</div><div className="kpi-note">تصميم + إشراف · {data.payments.length} دفعة</div></div>
        <div className="card"><div className="kpi-label">إجمالي المصروفات <I.coin style={{width:15,height:15,color:'var(--ink-faint)'}}/></div>
          <div className="kpi-value">{money(totalExpenses)}</div><div className="kpi-note">مكتب + تكاليف مشاريع</div></div>
        <div className="card"><div className="kpi-label">أمانات معلقة الاسترداد <I.landmark style={{width:15,height:15,color:'var(--ink-faint)'}}/></div>
          <div className="kpi-value" style={{color:govOutstanding>0?'var(--rust)':'var(--ink)'}}>{money(govOutstanding)}</div><div className="kpi-note">رسوم حكومية لم يسددها العملاء</div></div>
        <div className="card"><div className="kpi-label">المشاريع الجارية <I.compass style={{width:15,height:15,color:'var(--ink-faint)'}}/></div>
          <div className="kpi-value">{activeProjects}</div><div className="kpi-note">من إجمالي {data.projects.length} مشروع</div></div>
      </div>

      <div className="grid grid-2">
        <div className="card">
          <div className="section-title"><h3>الإيرادات مقابل المصروفات — آخر 6 أشهر</h3><div className="rule"></div></div>
          <div className="bars">
            {chartData.map(d=>(
              <div className="bar-col" key={d.m}>
                <div className="bar-wrap">
                  <div className="bar rev" style={{height:(d.rev/maxVal*130)+'px'}} title={money(d.rev)}></div>
                  <div className="bar exp" style={{height:(d.exp/maxVal*130)+'px'}} title={money(d.exp)}></div>
                </div>
                <div className="bar-label">{monthNamesAr[parseInt(d.m.split('-')[1],10)-1]}</div>
              </div>
            ))}
          </div>
          <div className="legend">
            <span><i style={{background:'var(--brass)'}}></i> الإيرادات الاستشارية</span>
            <span><i style={{background:'var(--ink-faint)'}}></i> المصروفات</span>
          </div>
        </div>

        <div className="card">
          <div className="section-title"><h3>أحدث قرارات المشاريع</h3><div className="rule"></div></div>
          {(data.decisions||[]).length===0 && <p style={{fontSize:12.5, color:'var(--ink-faint)'}}>لا قرارات مسجلة بعد — تُضاف من ملف المشروع أو باستيراد واتساب.</p>}
          {[...(data.decisions||[])].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,6).map(dc=>{
            const proj = data.projects.find(p=>p.id===dc.projectId)||{};
            const dd = daysSince(dc.date);
            const rel = dd===0?'اليوم':dd===1?'أمس':dd!==null?('منذ '+dd+' يوم'):'';
            return (
              <div className="alert-item" key={dc.id} onClick={()=>go('projects')} style={{cursor:'pointer'}}>
                <span><b style={{color:'var(--brass)'}}>{proj.projectNo||''}</b> {dc.description.slice(0,70)}{dc.description.length>70?'…':''}</span>
                <span style={{fontSize:10.5, color:'var(--ink-faint)', flexShrink:0}}>{rel}</span>
              </div>
            );
          })}
        </div>
      </div>

      <div className="grid grid-2" style={{marginTop:18}}>
        <div className="card">
          <div className="section-title"><h3>تنبيهات هامة</h3><div className="rule"></div><I.bell style={{width:16,height:16,color:'var(--brass)'}}/></div>
          {alerts.length===0 && <p style={{fontSize:13, color:'var(--ink-faint)'}}>لا توجد تنبيهات حالياً. كل شيء تحت السيطرة.</p>}
          {alerts.slice(0,8).map((a,idx)=>(
            <div className="alert-item" key={idx} onClick={()=>go(a.go)} style={{cursor:'pointer'}}>
              <span>{a.text}</span>
              <span className={"badge "+a.status}>{a.status==='bad'?'عاجل':'قريباً'}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ================= شاشة الدخول ================= */
function LoginView({onLogin, sbRef}){
  const [mode, setMode] = useState('in'); // in | up
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [name, setName] = useState('');
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState('');

  const submit = async ()=>{
    if(!email || !pass){ setMsg('أدخل البريد وكلمة المرور'); return; }
    setBusy(true); setMsg('');
    try{
      if(mode==='up'){
        const {error} = await sbRef.current.auth.signUp({email, password:pass, options:{data:{name}}});
        if(error) throw error;
        setMsg('تم إنشاء الحساب — إذا طُلب تأكيد البريد راجع صندوق الوارد ثم سجل الدخول');
        setMode('in');
      } else {
        const {error} = await sbRef.current.auth.signInWithPassword({email, password:pass});
        if(error) throw error;
        onLogin();
      }
    }catch(e){ setMsg(e.message==='Invalid login credentials' ? 'بيانات الدخول غير صحيحة' : (e.message||'حدث خطأ')); }
    setBusy(false);
  };

  return (
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'var(--ink)'}}>
      <div style={{background:'#fff', borderRadius:8, padding:'34px 38px', width:380, maxWidth:'92vw', boxShadow:'0 20px 60px rgba(0,0,0,.4)', borderTop:'4px solid var(--brass)'}}>
        <div style={{textAlign:'center', marginBottom:22}}>
          <img src={NITAQ_LOGO} alt="نطاق" style={{width:110, filter:'invert(1) brightness(0.15)'}} />
          <div style={{fontFamily:'Cairo', fontWeight:900, fontSize:15, color:'var(--ink)', marginTop:8}}>نظام نطاق ERP — النسخة السحابية</div>
        </div>
        {mode==='up' && (
          <div className="field" style={{marginBottom:12}}>
            <label>الاسم</label>
            <input value={name} onChange={e=>setName(e.target.value)} />
          </div>
        )}
        <div className="field" style={{marginBottom:12}}>
          <label>البريد الإلكتروني</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} style={{direction:'ltr'}} />
        </div>
        <div className="field" style={{marginBottom:16}}>
          <label>كلمة المرور</label>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)} style={{direction:'ltr'}}
            onKeyDown={e=>{ if(e.key==='Enter') submit(); }} />
        </div>
        {msg && <p style={{fontSize:12, color:'var(--rust)', marginBottom:12}}>{msg}</p>}
        <button className="btn brass" style={{width:'100%', justifyContent:'center'}} disabled={busy} onClick={submit}>
          {busy ? '...' : (mode==='in' ? 'تسجيل الدخول' : 'إنشاء حساب')}
        </button>
        <p style={{fontSize:12, textAlign:'center', marginTop:14, color:'var(--ink-soft)', cursor:'pointer'}}
          onClick={()=>setMode(mode==='in'?'up':'in')}>
          {mode==='in' ? 'مستخدم جديد؟ إنشاء حساب' : 'لديك حساب؟ تسجيل الدخول'}
        </p>
        <p style={{fontSize:10.5, textAlign:'center', marginTop:8, color:'var(--ink-faint)'}}>أول حساب يُنشأ يصبح "المالك" تلقائياً — والباقي "مهندس" حتى يرقّيهم المالك</p>
      </div>
    </div>
  );
}

/* ================= إدارة المستخدمين والصلاحيات (للمالك) ================= */
function UsersView({sbRef, myId}){
  const [rows, setRows] = useState(null);
  const load = async ()=>{
    const {data, error} = await sbRef.current.from('nitaq_profiles').select('*').order('created_at');
    if(!error) setRows(data||[]);
  };
  useEffect(()=>{ load(); },[]);
  const setRole = async (user_id, role)=>{
    const {error} = await sbRef.current.from('nitaq_profiles').update({role}).eq('user_id', user_id);
    if(error) alert('تعذر التعديل: '+error.message); else load();
  };
  const ROLE_AR = {owner:'مالك — صلاحية كاملة', accountant:'محاسب — كل المالية', engineer:'مهندس — المشاريع والقرارات'};
  return (
    <div>
      <div className="card" style={{padding:0, maxWidth:760}}>
        <table>
          <thead><tr><th>الاسم</th><th>البريد</th><th>الدور</th></tr></thead>
          <tbody>
            {rows===null && <tr className="empty-row"><td colSpan={3}>جارٍ التحميل...</td></tr>}
            {rows && rows.length===0 && <tr className="empty-row"><td colSpan={3}>لا مستخدمين بعد</td></tr>}
            {rows && rows.map(r=>(
              <tr key={r.user_id}>
                <td>{r.name||'—'}{r.user_id===myId && <span className="badge neutral" style={{marginInlineStart:8}}>أنت</span>}</td>
                <td style={{direction:'ltr', textAlign:'right'}}>{r.email}</td>
                <td>
                  <select value={r.role} disabled={r.user_id===myId}
                    onChange={e=>setRole(r.user_id, e.target.value)}
                    style={{border:'1px solid var(--line-strong)', borderRadius:4, padding:'6px 10px', fontSize:12}}>
                    {Object.entries(ROLE_AR).map(([v,l])=><option key={v} value={v}>{l}</option>)}
                  </select>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <p style={{fontSize:12, color:'var(--ink-faint)', marginTop:12}}>* الصلاحيات مطبقة على مستوى قاعدة البيانات نفسها (RLS) — المهندس لا يمكنه قراءة البيانات المالية حتى تقنياً. ملاحظة: بيانات الموظفين (شاملة الرواتب الأساسية) مقروءة لكل الأدوار لأن الأسماء مطلوبة في ملفات المراحل — أخبرني إن أردت فصل الرواتب في جدول مستقل.</p>
    </div>
  );
}

  audit:['سجل التدقيق','كل عملية إنشاء وتعديل وإلغاء وإصدار — بالمستخدم والوقت، غير قابل للتعديل'],
  payments:['الدفعات الاستشارية','دفعات مرحلة التصميم والاعتماد ودفعات الإشراف الشهري'],
  decisions:['القرارات والوقائع','السجل الرسمي لقرارات المشاريع — من واتساب والاجتماعات والموقع، بعد اعتمادها'],
  govFees:['الرسوم الحكومية','أمانات الدوائر: التخطيط والمساحة · سيوا · الاتصالات · الدفاع المدني · البلدية'],
  officeExpenses:['مصروفات المكتب','المصروفات العمومية والإدارية غير المرتبطة بمشروع'],
  projectCosts:['تكاليف المشاريع','التكاليف المباشرة المحمّلة على كل مشروع'],
  treasury:['الخزينة والبنك','الأرصدة الفعلية وحركة النقدية — وارد وصادر'],
  dues:['الذمم — مدينون ودائنون','من يدين لك وما يستحق عليك في لحظة واحدة'],
  vat:['ضريبة القيمة المضافة','فترات ربع سنوية وفق شهادة التسجيل — TRN: '+COMPANY.trn],
  statement:['كشف حساب مشروع','كشف تفصيلي بالدفعات والأمانات يُعرض على المالك أو الاستشاري عند الطلب'],
  reports:['التقارير المالية','قائمة الدخل وربحية المشاريع وتقرير الأمانات'],
  analytics:['التحليلات الذكية','هوامش الربح · توقع التدفق النقدي · كشف الشواذ · اقتراحات الفوترة · التقرير الشهري AR/EN'],
  employees:['الموظفون','بيانات الموظفين والإقامات'],
  attendance:['الحضور والانصراف','تسجيل الحضور اليومي للموظفين'],
  overtime:['الأوفرتايم','تسجيل ساعات العمل الإضافية'],
  advances:['السلف والخصومات','متابعة سلف ومستحقات الموظفين'],
  payroll:['الرواتب','كشف رواتب الموظفين الشهري'],
  cars:['سيارات الشركة','متابعة سيارات الشركة ورخصها'],
};

function App(){
  const [data, setData] = useState(seedData());
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState('dashboard');
  const saveTimer = useRef(null);
  const dataRef = useRef(data);
  useEffect(()=>{ dataRef.current = data; }, [data]);

  /* ---------- السحابة ---------- */
  const sbRef = useRef(null);
  const channelRef = useRef(null);
  const [cloud, setCloud] = useState({status: getSbConfig() ? 'init' : 'off', profile:null, msg:''});
  const [cloudEmpty, setCloudEmpty] = useState(false);
  const cloudReady = cloud.status==='ready';

  const applyRemote = (payload)=>{
    const evt = payload.eventType;
    if(evt==='DELETE'){
      const old = payload.old || {};
      if(!old.entity || old.entity==='settings' || old.entity==='attendance') return;
      setData(d=> Array.isArray(d[old.entity]) ? {...d, [old.entity]: d[old.entity].filter(r=>String(r.id)!==String(old.id))} : d);
      return;
    }
    const row = payload.new;
    if(!row || !row.entity) return;
    setData(d=>{
      if(row.entity==='settings') return {...d, settings:{...d.settings, ...row.data}};
      if(row.entity==='fccState') return {...d, fccState:(row.data&&row.data.map)||{}};
      if(row.entity==='attendance'){ const rec=row.data||{}; if(!rec.empId) return d; return {...d, attendance:{...d.attendance, [rec.empId]:rec.map||{}}}; }
      if(!Array.isArray(d[row.entity])) return d;
      const arr = d[row.entity];
      const i = arr.findIndex(r=>String(r.id)===String((row.data||{}).id));
      if(i>=0 && JSON.stringify(arr[i])===JSON.stringify(row.data)) return d;
      const na = i>=0 ? arr.map(r=> String(r.id)===String(row.data.id) ? row.data : r) : [...arr, row.data];
      return {...d, [row.entity]:na};
    });
  };

  const cloudBootstrap = async ()=>{
    setCloud(c=>({...c, status:'loading'}));
    try{
      const sb = sbRef.current;
      const {data:userData} = await sb.auth.getUser();
      const user = userData && userData.user;
      if(!user){ setCloud(c=>({...c, status:'login'})); return; }
      const profRes = await sb.from('nitaq_profiles').select('*').eq('user_id', user.id).single();
      const prof = profRes.data || {user_id:user.id, name:user.email, role:'engineer'};
      const recRes = await sb.from('nitaq_records').select('*');
      if(recRes.error){ setCloud(c=>({...c, status:'error', msg:recRes.error.message})); return; }
      const rows = recRes.data || [];
      if(rows.length>0){ setData(recordsToData(rows)); setCloudEmpty(false); }
      else setCloudEmpty(true);
      if(channelRef.current){ try{ sb.removeChannel(channelRef.current); }catch(e){} }
      channelRef.current = sb.channel('nitaq-rec')
        .on('postgres_changes', {event:'*', schema:'public', table:'nitaq_records'}, applyRemote)
        .subscribe();
      setCloud({status:'ready', profile:prof, msg:'✓ متصل'});
      setLoaded(true);
      if(prof.role==='engineer') setView('projects');
    }catch(e){ setCloud(c=>({...c, status:'error', msg:e.message||'خطأ في الاتصال'})); }
  };

  const connectCloud = async ()=>{
    const cfg = getSbConfig();
    if(!cfg || !cfg.url || !cfg.key) return;
    setCloud(c=>({...c, status:'init', msg:''}));
    let lastErr = null;
    for(let attempt=0; attempt<3 && !window.supabase; attempt++){
      try{ await loadScript(SB_CDN); break; }
      catch(e){ lastErr = e; await new Promise(r=>setTimeout(r, 1200)); }
    }
    if(!window.supabase){
      setCloud(c=>({...c, status:'error', msg:'تعذر تحميل مكتبة السحابة — تحقق من الإنترنت أو اضغط إعادة المحاولة'}));
      return;
    }
    try{
      sbRef.current = window.supabase.createClient(cfg.url, cfg.key);
      const sessRes = await sbRef.current.auth.getSession();
      if(sessRes.data && sessRes.data.session) await cloudBootstrap();
      else setCloud(c=>({...c, status:'login'}));
      sbRef.current.auth.onAuthStateChange((ev)=>{ if(ev==='SIGNED_OUT') setCloud({status:'login', profile:null, msg:''}); });
    }catch(e){ setCloud(c=>({...c, status:'error', msg:'تعذر الاتصال بالسحابة — تحقق من الإنترنت أو اضغط إعادة المحاولة'})); }
  };

  useEffect(()=>{ connectCloud(); },[]);

  const cloudUpsert = (entity, rec)=>{
    if(cloud.status!=='ready' || !sbRef.current || !rec || !rec.id) return;
    sbRef.current.from('nitaq_records').upsert({id:String(rec.id), entity, data:rec})
      .then(({error})=> setCloud(c=>({...c, msg: error ? '⚠ فشل المزامنة' : '✓ متزامن '+new Date().toLocaleTimeString('ar-AE',{hour:'2-digit',minute:'2-digit'})})));
  };
  const cloudDelete = (id)=>{
    if(cloud.status!=='ready' || !sbRef.current) return;
    sbRef.current.from('nitaq_records').delete().eq('id', String(id))
      .then(({error})=> setCloud(c=>({...c, msg: error ? '⚠ فشل الحذف — قد لا تملك الصلاحية' : '✓ متزامن'})));
  };
  const pushAllToCloud = async ()=>{
    if(!confirm('رفع كل البيانات المحلية إلى السحابة لأول مرة؟')) return;
    const rows = dataToRows(dataRef.current);
    for(let i=0;i<rows.length;i+=100){
      const {error} = await sbRef.current.from('nitaq_records').upsert(rows.slice(i,i+100));
      if(error){ alert('فشل الرفع: '+error.message); return; }
    }
    setCloudEmpty(false);
    alert('تم رفع '+rows.length+' سجلاً — النظام الآن سحابي بالكامل');
  };
  const logout = async ()=>{ if(sbRef.current) await sbRef.current.auth.signOut(); };

  const fileHandleRef = useRef(null);
  const [fileLinked, setFileLinked] = useState(false);
  const [saveState, setSaveState] = useState('');

  useEffect(()=>{
    (async ()=>{
      try{
        const val = await store.get('nitaq-data');
        if(val){
          const parsed = migrateData(JSON.parse(val));
          setData(d=>({...d, ...parsed}));
        }
      }catch(e){ /* لا توجد بيانات محفوظة بعد */ }
      setLoaded(true);
    })();
  },[]);

  useEffect(()=>{
    if(!loaded) return;
    if(saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async ()=>{
      const json = JSON.stringify(data);
      try{ await store.set('nitaq-data', json); }catch(e){ console.error('save failed', e); }
      if(fileHandleRef.current){
        try{
          const w = await fileHandleRef.current.createWritable();
          await w.write(JSON.stringify(data, null, 2));
          await w.close();
          setSaveState('✓ محفوظ في الملف '+new Date().toLocaleTimeString('ar-AE',{hour:'2-digit',minute:'2-digit'}));
        }catch(e){ setSaveState('⚠ تعذر الحفظ في الملف'); }
      }
    }, 500);
  },[data, loaded]);

  const linkDataFile = async ()=>{
    if(!window.showOpenFilePicker || !window.showSaveFilePicker){
      alert('ميزة الربط بملف بيانات تعمل على متصفح Chrome أو Edge على الكمبيوتر.\nعلى الأجهزة الأخرى استخدم زرّي النسخة الاحتياطية والاستيراد.');
      return;
    }
    const openExisting = confirm('اضغط "موافق" لفتح ملف بيانات موجود مسبقاً،\nأو "إلغاء" لإنشاء ملف بيانات جديد.');
    try{
      let handle;
      if(openExisting){
        const picked = await window.showOpenFilePicker({types:[{description:'Nitaq Data', accept:{'application/json':['.json']}}]});
        handle = picked[0];
        if(handle.requestPermission){
          const perm = await handle.requestPermission({mode:'readwrite'});
          if(perm!=='granted'){ alert('لم يتم منح صلاحية الكتابة على الملف'); return; }
        }
        const f = await handle.getFile();
        const txt = await f.text();
        if(txt.trim()){
          const parsed = migrateData(JSON.parse(txt));
          setData(d=>({...d, ...parsed}));
        }
      } else {
        handle = await window.showSaveFilePicker({suggestedName:'nitaq-data.json', types:[{description:'Nitaq Data', accept:{'application/json':['.json']}}]});
      }
      fileHandleRef.current = handle;
      setFileLinked(true);
      setSaveState('✓ تم ربط الملف');
    }catch(e){ /* أُلغيت العملية */ }
  };

  const configs = useMemo(()=>buildConfigs(data), [data]);

  const auditWrite = (action, entity, recordId, summary)=>{
    if(entity==='auditLog') return;
    const rec = {
      id: uid(), _ts: Date.now(),
      at: new Date().toISOString().slice(0,16).replace('T',' '),
      user: (cloud.profile && cloud.profile.name) || 'مستخدم محلي',
      action, entity, recordId: String(recordId||''), summary: (summary||'').slice(0,300),
    };
    setData(d=>({...d, auditLog:[...(d.auditLog||[]), rec]}));
    cloudUpsert('auditLog', rec);
  };
  const describeRecord = (key, r)=>{
    if(!r) return '';
    if(key==='payments') return (r.label || (r.phase==='إشراف'?'إشراف '+(r.month||''):r.phase) || '') + ' — ' + money(r.amount||0);
    if(key==='projects') return (r.projectNo?r.projectNo+' — ':'')+(r.name||'');
    if(key==='contracts') return (r.type||r.category||'')+' — '+(r.description||'');
    if(key==='govFees') return (r.department||'')+' — '+money(r.amount||0);
    return r.name || r.label || r.description || '';
  };
  const mutate = (key) => ({
    add:(record)=>{
      setData(d=>({...d, [key]:[...d[key], record]}));
      cloudUpsert(key, record);
      if(key==='employees') cloudUpsert('staffDir', {id:'sd-'+record.id, empId:record.id, name:record.name||''});
      auditWrite('إنشاء', key, record.id, describeRecord(key, record));
    },
    update:(id, patch)=>{
      const cur = (dataRef.current[key]||[]).find(r=>r.id===id);
      const merged = cur ? {...cur, ...patch} : null;
      setData(d=>({...d, [key]: d[key].map(r=> r.id===id ? {...r,...patch} : r)}));
      if(merged) cloudUpsert(key, merged);
      if(key==='employees' && merged) cloudUpsert('staffDir', {id:'sd-'+id, empId:id, name:merged.name||''});
      if(cur){
        let action = 'تعديل';
        if(patch.archived===true) action = 'أرشفة / إلغاء';
        else if(patch.archived===false) action = 'استرجاع من الأرشيف';
        else if((patch.invoiceNo && !cur.invoiceNo) || (patch.receiptNo && !cur.receiptNo)) action = 'إصدار مستند';
        const changes = Object.keys(patch)
          .filter(k=> k!=='_ts' && k!=='docSnapshot' && JSON.stringify(cur[k])!==JSON.stringify(patch[k]))
          .slice(0,4)
          .map(k=> k+': '+(cur[k]===undefined||cur[k]===''?'—':String(cur[k]).slice(0,30))+' ← '+(patch[k]===''?'—':String(patch[k]).slice(0,30)))
          .join(' · ');
        auditWrite(action, key, id, describeRecord(key, merged)+(changes?' | '+changes:''));
      }
    },
    del:(id)=>{
      const cur = (dataRef.current[key]||[]).find(r=>r.id===id);
      setData(d=>({...d, [key]: d[key].filter(r=>r.id!==id)}));
      cloudDelete(id);
      if(key==='employees') cloudDelete('sd-'+id);
      auditWrite('حذف نهائي', key, id, describeRecord(key, cur));
    },
  });

  const setAttendance = (empId, dateStr, status) => {
    const emp = {...((dataRef.current.attendance||{})[empId]||{})};
    if(status===null) delete emp[dateStr]; else emp[dateStr]=status;
    setData(d=>({...d, attendance:{...d.attendance, [empId]:emp}}));
    cloudUpsert('attendance', {id:'att-'+empId, empId, map:emp});
  };

  const importRef = useRef(null);
  const exportBackup = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'nitaq-backup-'+todayISO()+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };
  const importBackup = (e) => {
    const f = e.target.files && e.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = () => {
      try{
        const parsed = migrateData(JSON.parse(r.result));
        setData(d=>({...d, ...parsed}));
        alert('تم استيراد النسخة الاحتياطية بنجاح');
      }catch(err){ alert('الملف غير صالح — تأكد أنه نسخة احتياطية من هذا النظام'); }
    };
    r.readAsText(f);
    e.target.value = '';
  };

  const [jumpProject, setJumpProject] = useState(null);
  const fccUrgent = useMemo(()=>{
    const st = data.fccState||{};
    return buildFccItems(data).filter(it=>{ const s=st[it.key]; return it.pr==='high' && !(s&&(s.done||(s.snoozeUntil&&s.snoozeUntil>=todayISO()))); }).length;
  }, [data]);
  const role = cloud.profile ? cloud.profile.role : 'owner';
  const ROLE_AR = {owner:'مالك', accountant:'محاسب', engineer:'مهندس'};
  const navAllowed = (key)=>{
    if(role==='engineer') return ENGINEER_VIEWS.includes(key);
    if(role==='accountant') return key!=='users';
    return true;
  };

  const urgentCount = (key) => {
    if(key==='employees') return data.employees.filter(e=> ['iqamaExpiry','passportExpiry','workCardExpiry'].some(f=>{const dd=daysUntil(e[f]); return dd!==null && dd<=60;})).length;
    if(key==='cars') return data.cars.filter(c=>{const dd=daysUntil(c.licenseExpiry); return dd!==null && dd<=60;}).length;
    if(key==='govFees') return data.govFees.filter(g=>!isArchived(g) && g.payerType!=='المالك مباشرة' && g.paidStatus==='مدفوع' && g.reimburseStatus!=='مسترد').length;
    if(key==='fcc') return fccUrgent;
    if(key==='dues') return data.govFees.filter(g=>!isArchived(g) && g.payerType!=='المالك مباشرة' && g.paidStatus!=='مدفوع').length;
    if(key==='payments') return data.payments.filter(i=>{ if(remainderOf(i)<=0) return false; const dd=daysUntil(i.dueDate); return dd!==null && dd<0; }).length;
    return 0;
  };

  const renderView = () => {
    if(!navAllowed(view)) return <ProjectsView data={data} configs={configs} mutate={mutate} role={role} />;
    if(view==='fcc') return <FccView data={data} mutate={mutate} go={setView} setFcc={(m)=>{ setData(d=>({...d, fccState:m})); cloudUpsert('fccState', {id:'fccState', map:m}); }} />;
    if(view==='dashboard') return <Dashboard data={data} go={setView} />;
    if(view==='projects') return <ProjectsView data={data} configs={configs} mutate={mutate} jumpId={jumpProject} onJumpDone={()=>setJumpProject(null)} role={role} />;
    if(view==='settings') return <SettingsView data={data} setSettings={(s)=>{ setData(d=>({...d, settings:s})); cloudUpsert('settings', {id:'settings', ...s}); auditWrite('تعديل', 'settings', 'settings', 'تحديث إعدادات النظام (المسار/البيانات البنكية)'); }} />;
    if(view==='audit') return <AuditView data={data} />;
    if(view==='users') return cloud.status==='ready' ? <UsersView sbRef={sbRef} myId={cloud.profile&&cloud.profile.user_id} /> : <div className="card"><p style={{fontSize:13, margin:0}}>إدارة المستخدمين متاحة في الوضع السحابي فقط — فعّل Supabase من الإعدادات.</p></div>;
    if(view==='payments') return <PaymentsView data={data} configs={configs} mutate={mutate} role={role} />;
    if(view==='contracts' || view==='decisions') return <ProjectFilteredList entity={view} data={data} configs={configs} mutate={mutate} />;
    if(view==='officeExpenses') return <OfficeExpensesView data={data} configs={configs} mutate={mutate} />;
    if(view==='govFees') return <GovFeesView data={data} configs={configs} mutate={mutate} />;
    if(view==='vat') return <VatView data={data} />;
    if(view==='statement') return <StatementView data={data} />;
    if(view==='reports') return <ReportsView data={data} />;
    if(view==='analytics') return <AnalyticsView data={data} />;
    if(view==='payroll') return <PayrollView data={data} mutate={mutate} />;
    if(view==='treasury') return <TreasuryView data={data} configs={configs} mutate={mutate} />;
    if(view==='dues') return <DuesView data={data} />;
    if(view==='attendance') return <AttendanceView data={data} setAttendance={setAttendance} />;
    if(configs[view]){
      const m = mutate(view);
      return <EntityView config={configs[view]} records={data[view]} data={data}
        onAdd={m.add} onUpdate={m.update} onDelete={m.del} />;
    }
    return null;
  };

  const [title, subtitle] = VIEW_TITLES[view] || ['',''];

  if(cloud.status==='login') return <LoginView sbRef={sbRef} onLogin={cloudBootstrap} />;
  if(cloud.status==='init' || cloud.status==='loading') return (
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'var(--ink)', flexDirection:'column', gap:16}}>
      <img src={NITAQ_LOGO} alt="نطاق" style={{width:130}} />
      <div style={{color:'#C7D0DB', fontSize:13.5}}>جارٍ الاتصال بسحابة نطاق...</div>
    </div>
  );

  return (
    <div className="app">
      <div className="sidebar">
        <div className="brand" style={{textAlign:'center'}}>
          <img src={NITAQ_LOGO} alt="نطاق" style={{width:110, display:'block', margin:'0 auto 8px'}} />
          <p>الاستشارات الهندسية · الشارقة</p>
        </div>
        <nav className="nav">
          {NAV.map(group=>{
            const items = group.items.filter(item=>navAllowed(item.key));
            if(items.length===0) return null;
            return (
            <div key={group.group}>
              <div className="nav-group-label">{group.group}</div>
              {items.map(item=>{
                const Icon = item.icon;
                const count = urgentCount(item.key);
                return (
                  <div key={item.key} className={"nav-item "+(view===item.key?'active':'')} onClick={()=>setView(item.key)}>
                    <Icon/>
                    <span>{item.label}</span>
                    {count>0 && <span className="dot"></span>}
                  </div>
                );
              })}
            </div>
            );
          })}
        </nav>
        <div className="sidebar-foot">
          {cloud.status==='ready' && (
            <div style={{border:'1px solid var(--teal)', borderRadius:4, padding:'7px 10px', marginBottom:8, fontSize:11, color:'#9FD8CC', display:'flex', alignItems:'center', gap:6, flexWrap:'wrap'}}>
              <span>☁ {cloud.profile ? (cloud.profile.name||'') : ''} ({ROLE_AR[role]||role})</span>
              <span style={{marginInlineStart:'auto', fontSize:9.5, color:'#7FA8A0'}}>{cloud.msg}</span>
              <span onClick={logout} style={{cursor:'pointer', textDecoration:'underline', fontSize:10}}>خروج</span>
            </div>
          )}
          {cloud.status==='error' && (
            <div style={{border:'1px solid var(--rust)', borderRadius:4, padding:'7px 10px', marginBottom:8, fontSize:10.5, color:'#E8A79A'}}>
              ⚠ السحابة: {cloud.msg} — النظام يعمل محلياً
              <div style={{marginTop:6}}>
                <span onClick={connectCloud} style={{cursor:'pointer', textDecoration:'underline', fontWeight:700, color:'#fff'}}>↻ إعادة محاولة الاتصال</span>
              </div>
            </div>
          )}
          {cloud.status==='ready' && cloudEmpty && (
            <button className="btn small" style={{width:'100%', background:'var(--brass)', color:'#fff', marginBottom:8, justifyContent:'center', border:'none'}} onClick={pushAllToCloud}>⬆ رفع البيانات المحلية للسحابة (أول مرة)</button>
          )}
          <button className="btn ghost small" style={{width:'100%', border:'1px solid '+(fileLinked?'var(--teal)':'var(--brass)'), color:fileLinked?'var(--teal)':'#EDEFEA', marginBottom:6, justifyContent:'center'}} onClick={linkDataFile}>
            {fileLinked ? '✓ الحفظ التلقائي في ملف مفعّل' : '🔗 ربط ملف بيانات (حفظ تلقائي)'}
          </button>
          {saveState && <div style={{fontSize:10, color:'#8794A6', textAlign:'center', marginBottom:6}}>{saveState}</div>}
          {role==='owner' && (
            <React.Fragment>
              <div style={{display:'flex', gap:6, marginBottom:6}}>
                <button className="btn ghost small" style={{flex:1, border:'1px dashed var(--line-strong)'}} onClick={exportBackup}>⬇ نسخة احتياطية</button>
                <button className="btn ghost small" style={{flex:1, border:'1px dashed var(--line-strong)'}} onClick={()=>importRef.current && importRef.current.click()}>⬆ استيراد</button>
                <input ref={importRef} type="file" accept="application/json,.json" style={{display:'none'}} onChange={importBackup} />
              </div>
              <button className="btn ghost small" style={{width:'100%', border:'1px dashed var(--brass)', color:'#D9C08F', marginBottom:8, justifyContent:'center'}}
                onClick={async ()=>{ try{ await exportExcelBackup(dataRef.current, configs); }catch(e){ alert(e.message); } }}>
                📊 تصدير Excel شامل (كل الأقسام)
              </button>
            </React.Fragment>
          )}
          نظام داخلي · بياناتك محفوظة تلقائياً
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div>
            <h2>{title}</h2>
            <div className="sub">{subtitle}</div>
          </div>
          <div className="topbar-right" style={{display:'flex', gap:14, alignItems:'center', flexWrap:'wrap'}}>
            <GlobalSearch data={data} go={setView} navAllowed={navAllowed}
              jumpToProject={(id)=>{ setJumpProject(id); setView('projects'); }} />
            <span className="topbar-date">{new Date().toLocaleDateString('ar-AE', {weekday:'long', year:'numeric', month:'long', day:'numeric'})}</span>
          </div>
        </div>
        <div className="content">
          {renderView()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
