<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>نطاق | نظام الحسابات والموارد البشرية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#132A46;
    --ink-soft:#4C617D;
    --ink-faint:#8996A8;
    --paper:#EDEEE8;
    --surface:#FFFFFF;
    --line:#D7D9D0;
    --line-strong:#B7BCAF;
    --brass:#A9824F;
    --brass-soft:#EDE1CB;
    --teal:#2E6E63;
    --teal-soft:#DDEAE6;
    --rust:#AE4E2D;
    --rust-soft:#F3DDD2;
    --amber:#B8862C;
    --amber-soft:#F3E5C4;
    --blue:#2F5E8C;
    --blue-soft:#DDE7F1;
    --radius:5px;
    --shadow:0 1px 2px rgba(19,42,70,.06), 0 6px 18px rgba(19,42,70,.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Tajawal',sans-serif;
    background:
      linear-gradient(var(--paper),var(--paper)),
      repeating-linear-gradient(0deg, rgba(19,42,70,.035) 0, rgba(19,42,70,.035) 1px, transparent 1px, transparent 40px),
      repeating-linear-gradient(90deg, rgba(19,42,70,.035) 0, rgba(19,42,70,.035) 1px, transparent 1px, transparent 40px);
    color:var(--ink);
    font-variant-numeric:tabular-nums;
    min-height:100vh;
  }
  h1,h2,h3,h4{font-family:'Cairo',sans-serif;margin:0;color:var(--ink);}
  button{font-family:'Tajawal',sans-serif;cursor:pointer;}
  input,select,textarea{font-family:'Tajawal',sans-serif;font-size:14px;}
  ::selection{background:var(--brass-soft);}

  .app{display:flex;min-height:100vh;}

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:236px;flex:none;background:var(--ink);color:#EDEFEA;
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
  }
  .brand{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.12);}
  .brand-mark{
    width:38px;height:38px;border:1.5px solid var(--brass);border-radius:2px;
    display:flex;align-items:center;justify-content:center;margin-bottom:10px;
    position:relative;
  }
  .brand-mark::before,.brand-mark::after{content:"";position:absolute;background:var(--brass);}
  .brand-mark::before{width:14px;height:1.5px;}
  .brand-mark::after{width:1.5px;height:14px;}
  .brand h1{font-size:17px;color:#fff;font-weight:800;letter-spacing:.5px;}
  .brand p{margin:4px 0 0;font-size:11px;color:#AAB5C3;letter-spacing:.5px;}
  .nav{flex:1;overflow-y:auto;padding:14px 10px;}
  .nav-group-label{font-size:10.5px;color:#8794A6;letter-spacing:1px;padding:14px 10px 6px;}
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:4px;
    font-size:13.5px;color:#C7D0DB;margin-bottom:2px;border:1px solid transparent;
    transition:background .12s;position:relative;
  }
  .nav-item svg{width:16px;height:16px;flex:none;}
  .nav-item:hover{background:rgba(255,255,255,.06);cursor:pointer;}
  .nav-item.active{background:rgba(169,130,79,.18);color:#fff;border-color:rgba(169,130,79,.4);}
  .nav-item .dot{width:6px;height:6px;border-radius:50%;background:var(--rust);position:absolute;left:10px;}
  .sidebar-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.1);font-size:10.5px;color:#7C8AA0;}

  /* ---------- Main ---------- */
  .main{flex:1;min-width:0;}
  .topbar{
    background:var(--surface);border-bottom:1px solid var(--line);
    padding:16px 28px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:5;
  }
  .topbar h2{font-size:19px;font-weight:800;}
  .topbar .sub{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .topbar-right{display:flex;align-items:center;gap:14px;font-size:12.5px;color:var(--ink-soft);}
  .content{padding:26px 28px 60px;}

  /* ---------- Cards / generic ---------- */
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);position:relative;padding:18px 20px;
  }
  .card::before,.card::after{content:"";position:absolute;top:8px;width:9px;height:9px;
    border-top:1.4px solid var(--line-strong);}
  .card::before{right:8px;border-right:1.4px solid var(--line-strong);}
  .card::after{left:8px;border-left:1.4px solid var(--line-strong);}
  .grid{display:grid;gap:16px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:2fr 1fr;}
  @media (max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-2{grid-template-columns:1fr;}}

  .kpi-label{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;justify-content:space-between;}
  .kpi-value{font-family:'Cairo',sans-serif;font-size:26px;font-weight:800;margin-top:8px;}
  .kpi-note{font-size:11px;color:var(--ink-faint);margin-top:6px;}

  .section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .section-title h3{font-size:15px;font-weight:800;}
  .section-title .rule{flex:1;height:0;border-top:1px dashed var(--line-strong);margin:0 12px;}

  /* ---------- Buttons ---------- */
  .btn{
    border:1px solid var(--ink);background:var(--ink);color:#fff;padding:8px 16px;
    border-radius:4px;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:6px;
  }
  .btn:hover{background:#0D1D33;}
  .btn.outline{background:transparent;color:var(--ink);}
  .btn.outline:hover{background:rgba(19,42,70,.05);}
  .btn.brass{background:var(--brass);border-color:var(--brass);}
  .btn.small{padding:5px 10px;font-size:12px;}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--ink-soft);padding:5px 8px;}
  .btn.ghost:hover{background:rgba(19,42,70,.06);}
  .btn.danger{color:var(--rust);}
  .btn svg{width:14px;height:14px;}

  /* ---------- Table ---------- */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{
    text-align:right;font-size:11px;color:var(--ink-soft);font-weight:700;
    padding:8px 10px;border-bottom:1.4px solid var(--line-strong);letter-spacing:.3px;
  }
  tbody td{padding:10px 10px;border-bottom:1px solid var(--line);color:var(--ink);vertical-align:middle;}
  tbody td.cell-clip{max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  tbody tr:hover{background:rgba(19,42,70,.025);}
  tbody tr:last-child td{border-bottom:none;}
  .empty-row td{color:var(--ink-faint);text-align:center;padding:26px;font-size:13px;}

  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
    padding:3px 9px;border-radius:20px;}
  .badge.ok{background:var(--teal-soft);color:var(--teal);}
  .badge.soon{background:var(--amber-soft);color:var(--amber);}
  .badge.bad{background:var(--rust-soft);color:var(--rust);}
  .badge.neutral{background:var(--blue-soft);color:var(--blue);}
  .badge.gray{background:#EAEAE4;color:var(--ink-soft);}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(19,42,70,.45);display:flex;
    align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{background:var(--surface);border-radius:6px;width:480px;max-width:100%;
    max-height:88vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.25);}
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .modal-head h3{font-size:16px;}
  .modal-body{padding:20px 22px;display:flex;flex-direction:column;gap:14px;}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;}
  .field label{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:6px;font-weight:700;}
  .field input, .field select, .field textarea{
    width:100%;border:1px solid var(--line-strong);border-radius:4px;padding:9px 10px;
    background:#FBFBF9;color:var(--ink);outline:none;
  }
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--brass);background:#fff;}
  .close-x{background:none;border:none;font-size:18px;color:var(--ink-soft);}

  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
  .filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .filters select, .filters input{border:1px solid var(--line-strong);border-radius:4px;padding:7px 10px;font-size:12.5px;background:#fff;}

  .alert-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .alert-item:last-child{border-bottom:none;}

  .progress{height:6px;background:var(--line);border-radius:4px;overflow:hidden;margin-top:8px;}
  .progress > div{height:100%;background:var(--brass);}

  .att-grid{overflow-x:auto;}
  .att-table{border-collapse:collapse;min-width:100%;}
  .att-table th, .att-table td{border:1px solid var(--line);text-align:center;font-size:10.5px;padding:0;}
  .att-table th{background:#F5F5F0;padding:6px 2px;font-weight:700;color:var(--ink-soft);}
  .att-name-col{position:sticky;right:0;background:#fff;text-align:right !important;padding:8px 10px !important;
    font-size:12.5px;font-weight:700;min-width:150px;z-index:1;border-left:1.4px solid var(--line-strong);}
  .att-cell{width:26px;height:30px;cursor:pointer;font-size:10px;font-weight:800;user-select:none;}
  .att-cell.present{background:var(--teal-soft);color:var(--teal);}
  .att-cell.absent{background:var(--rust-soft);color:var(--rust);}
  .att-cell.leave{background:var(--blue-soft);color:var(--blue);}
  .att-cell.late{background:var(--amber-soft);color:var(--amber);}
  .att-cell.empty{background:#fff;color:var(--line-strong);}
  .legend{display:flex;gap:14px;font-size:11.5px;color:var(--ink-soft);margin-top:12px;flex-wrap:wrap;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .legend i{width:10px;height:10px;border-radius:2px;display:inline-block;}

  .bars{display:flex;align-items:flex-end;gap:14px;height:170px;padding-top:10px;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar-wrap{display:flex;align-items:flex-end;gap:3px;height:130px;}
  .bar{width:13px;border-radius:2px 2px 0 0;}
  .bar.rev{background:var(--brass);}
  .bar.exp{background:var(--ink-faint);}
  .bar-label{font-size:10.5px;color:var(--ink-soft);}




  .searchbox{border:1px solid var(--line-strong);border-radius:4px;padding:8px 12px;font-size:12.5px;font-family:'Tajawal',sans-serif;background:#fff;min-width:170px;}
  .searchbox:focus{outline:none;border-color:var(--brass);}
  /* ---------- ملف المشروع: تبويبات + Timeline ---------- */
  .tabs{display:flex;gap:2px;border-bottom:2px solid var(--line);margin-bottom:20px;flex-wrap:wrap;}
  .tab{padding:9px 16px;font-size:12.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;}
  .tab:hover{color:var(--ink);}
  .tab.active{color:var(--brass);border-bottom-color:var(--brass);}
  .tl{display:flex;align-items:flex-start;margin:10px 0 6px;overflow-x:auto;padding-bottom:6px;}
  .tl-step{flex:1;min-width:86px;text-align:center;position:relative;cursor:pointer;}
  .tl-step::before{content:"";position:absolute;top:14px;right:50%;width:100%;height:2px;background:var(--line-strong);z-index:0;}
  .tl-step:first-child::before{display:none;}
  .tl-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--line-strong);background:#fff;margin:0 auto 7px;position:relative;z-index:1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;transition:all .15s;}
  .tl-step.done .tl-dot{background:var(--teal);border-color:var(--teal);}
  .tl-step.active .tl-dot{background:var(--brass);border-color:var(--brass);}
  .tl-step.done::before,.tl-step.active::before{background:var(--teal);}
  .tl-label{font-size:11px;font-weight:700;color:var(--ink-soft);}
  .tl-step.done .tl-label,.tl-step.active .tl-label{color:var(--ink);}
  .tl-date{font-size:9.5px;color:var(--ink-faint);margin-top:2px;}
  .apv{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:12px;}
  .apv-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border:1px solid var(--line);border-radius:4px;cursor:pointer;font-size:12.5px;font-weight:700;color:var(--ink-soft);background:#fff;transition:all .12s;}
  .apv-item:hover{border-color:var(--brass);}
  .apv-item .bx{width:17px;height:17px;border:1.6px solid var(--ink-faint);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;flex-shrink:0;}
  .apv-item.on{border-color:var(--teal);color:var(--ink);background:var(--teal-soft);}
  .apv-item.on .bx{background:var(--teal);border-color:var(--teal);}
  .apv-item .dt{margin-inline-start:auto;font-size:10px;color:var(--ink-faint);font-weight:600;}
  .info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:2px 24px;}
  .info-grid .doc-line{padding:8px 0;}

  /* ---------- إيصال استلام دفعة (مطابق للنموذج الرسمي) ---------- */
  .rcpt{background:#fff;max-width:860px;margin:0 auto;box-shadow:var(--shadow);border:1px solid var(--line);position:relative;overflow:hidden;}
  .rcpt-band{background:#0D1B3E;color:#fff;padding:18px 30px;display:flex;justify-content:space-between;align-items:center;gap:16px;}
  .rcpt-logo{text-align:center;line-height:1;}
  .rcpt-logo .ar{font-family:'Cairo',sans-serif;font-size:26px;font-weight:900;color:#fff;}
  .rcpt-logo .en{font-size:10px;letter-spacing:4px;color:#B8965A;margin-top:4px;font-weight:700;}
  .rcpt-cotitle{text-align:right;}
  .rcpt-cotitle .ar{font-family:'Cairo',sans-serif;font-size:21px;font-weight:800;}
  .rcpt-cotitle .en{font-size:10.5px;letter-spacing:5px;color:#C9D2DF;margin-top:5px;}
  .rcpt-cotitle .en b{color:#B8965A;}
  .rcpt-gold{height:5px;background:#B8965A;}
  .rcpt-body{padding:26px 34px 30px;position:relative;}
  .rcpt-wm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .rcpt-wm span{font-family:'Cairo',sans-serif;font-size:190px;font-weight:900;color:#0D1B3E;opacity:.035;transform:rotate(0deg);}
  .rcpt-titlerow{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:26px;flex-wrap:wrap;}
  .rcpt-title{text-align:center;flex:1;}
  .rcpt-title .ar{font-family:'Cairo',sans-serif;font-size:30px;font-weight:900;color:#0D1B3E;}
  .rcpt-title .en{font-size:12px;letter-spacing:7px;color:#B8965A;font-weight:700;margin-top:4px;}
  .rcpt-title .orn{color:#B8965A;font-size:11px;margin-top:6px;letter-spacing:3px;}
  .rcpt-meta{min-width:230px;}
  .rcpt-meta .row{display:flex;align-items:baseline;gap:8px;font-size:12.5px;margin-bottom:10px;}
  .rcpt-meta .lbl{color:#0D1B3E;font-weight:800;white-space:nowrap;}
  .rcpt-meta .en{color:var(--ink-soft);font-size:11px;white-space:nowrap;}
  .rcpt-meta .val{flex:1;border-bottom:1.3px dotted var(--ink-faint);text-align:center;font-weight:800;font-family:'Cairo',sans-serif;padding:0 6px 2px;}
  .rcpt-line{display:flex;align-items:baseline;gap:10px;margin-bottom:20px;font-size:13.5px;flex-wrap:wrap;}
  .rcpt-line .lbl{color:#0D1B3E;font-weight:800;white-space:nowrap;}
  .rcpt-line .en{color:var(--ink-soft);font-size:11px;white-space:nowrap;}
  .rcpt-line .val{flex:1;min-width:120px;border-bottom:1.3px dotted var(--ink-faint);text-align:center;font-weight:700;font-family:'Cairo',sans-serif;padding:0 8px 3px;}
  .rcpt-check{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:#0D1B3E;margin-inline-start:14px;}
  .rcpt-check .box{width:16px;height:16px;border:1.6px solid #0D1B3E;border-radius:2px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#0D1B3E;background:#fff;}
  .rcpt-check .en{font-size:10.5px;color:var(--ink-soft);font-weight:600;}
  .rcpt-bottom{display:flex;gap:22px;margin-top:30px;align-items:stretch;flex-wrap:wrap;}
  .rcpt-amount{flex:1.2;min-width:280px;background:#FBF4E8;border:1.6px solid #B8965A;border-radius:6px;padding:16px 20px;}
  .rcpt-amount .hd{display:flex;justify-content:space-between;font-size:13px;font-weight:800;color:#0D1B3E;}
  .rcpt-amount .hd .en{color:var(--ink-soft);font-weight:700;font-size:12px;}
  .rcpt-amount .amt{display:flex;align-items:baseline;gap:14px;margin-top:12px;}
  .rcpt-amount .cur{font-size:17px;font-weight:900;color:#B8965A;letter-spacing:2px;}
  .rcpt-amount .num{flex:1;border-bottom:1.4px solid #0D1B3E;text-align:center;font-family:'Cairo',sans-serif;font-size:22px;font-weight:900;color:#0D1B3E;padding-bottom:3px;}
  .rcpt-amount .words{font-size:11px;color:var(--ink-soft);margin-top:8px;text-align:center;}
  .rcpt-amount .vatline{font-size:10.5px;color:var(--ink-faint);margin-top:5px;text-align:center;}
  .rcpt-stamp{flex:1;min-width:230px;border:1.6px dashed var(--ink-faint);border-radius:6px;padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;text-align:center;}
  .rcpt-stamp .t{font-size:12.5px;font-weight:800;color:#0D1B3E;}
  .rcpt-stamp .en{font-size:10.5px;color:var(--ink-soft);margin-top:3px;}
  .rcpt-stamp .co{font-size:10px;letter-spacing:2.5px;color:var(--ink-faint);margin-top:26px;}
  .rcpt-foot{background:#0D1B3E;color:#C9D2DF;padding:12px 30px;display:flex;justify-content:space-between;align-items:center;font-size:10.5px;letter-spacing:1px;gap:12px;flex-wrap:wrap;}
  .rcpt-foot .tag{font-family:'Cairo',sans-serif;color:#fff;font-size:12px;letter-spacing:0;font-weight:700;}
  @media(max-width:700px){.rcpt-band{flex-direction:column;} .rcpt-cotitle{text-align:center;}}
  .rcpt-pair{display:flex;flex-direction:column;gap:10px;max-width:860px;margin:0 auto;}
  .rcpt-copytag{position:absolute;top:8px;left:8px;font-size:9px;font-weight:800;color:var(--ink-faint);letter-spacing:.5px;z-index:2;}
  .rcpt-cutline{display:flex;align-items:center;gap:8px;color:var(--ink-faint);font-size:10px;letter-spacing:1px;}
  .rcpt-cutline::before,.rcpt-cutline::after{content:"";flex:1;border-top:1px dashed var(--ink-faint);}

  /* ---------- Printable Docs (سند قبض / كشف حساب) ---------- */
  .doc{background:#fff;border:1px solid var(--line);max-width:840px;margin:0 auto;box-shadow:var(--shadow);}
  .doc-head{background:var(--ink);color:#fff;padding:20px 28px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--brass);gap:16px;flex-wrap:wrap;}
  .doc-head .brand-mark{margin-bottom:0;}
  .doc-brand{display:flex;align-items:center;gap:12px;}
  .doc-brand h1{font-size:18px;color:#fff;font-weight:800;}
  .doc-brand p{margin:2px 0 0;font-size:10.5px;color:#AAB5C3;letter-spacing:.5px;}
  .doc-type{text-align:left;}
  .doc-type .t{font-family:'Cairo',sans-serif;font-size:16px;font-weight:800;color:var(--brass);}
  .doc-type .n{font-size:12px;color:#C7D0DB;margin-top:4px;}
  .doc-body{padding:24px 28px;}
  .doc-line{display:flex;gap:10px;align-items:baseline;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13.5px;flex-wrap:wrap;}
  .doc-line .lbl{color:var(--ink-soft);font-weight:700;font-size:12px;min-width:130px;}
  .doc-line .val{font-weight:700;}
  .doc-amount{background:var(--brass-soft);border:1px solid var(--brass);border-radius:4px;padding:12px 16px;margin:16px 0;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  .doc-amount .num{font-family:'Cairo',sans-serif;font-size:22px;font-weight:900;color:var(--ink);}

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useMemo} = React;

/* ================= Helpers ================= */
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fmt = (n) => Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const money = (n) => fmt(n)+' د.إ';
const todayISO = () => new Date().toISOString().slice(0,10);
const monthKey = (dateStr) => (dateStr||'').slice(0,7);
const daysUntil = (dateStr) => {
  if(!dateStr) return null;
  return Math.round((new Date(dateStr) - new Date())/86400000);
};
const expiryStatus = (dateStr) => {
  const d = daysUntil(dateStr);
  if(d===null) return 'gray';
  if(d<0) return 'bad';
  if(d<=60) return 'soon';
  return 'ok';
};
const expiryLabel = (dateStr) => {
  const d = daysUntil(dateStr);
  if(d===null) return 'غير محدد';
  if(d<0) return 'منتهية منذ '+Math.abs(d)+' يوم';
  if(d<=60) return 'تنتهي خلال '+d+' يوم';
  return 'سارية';
};
const monthNamesAr = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const monthNamesEn = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const fmtMonth = (key) => { const [y,m]=key.split('-'); return monthNamesAr[parseInt(m,10)-1]+' '+y; };
const fmtMonthEn = (key) => { const [y,m]=key.split('-'); return monthNamesEn[parseInt(m,10)-1]+' '+y; };
const last6Months = () => {
  const arr=[]; const now=new Date();
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(), now.getMonth()-i, 1);
    arr.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
  }
  return arr;
};

const currentYM = () => { const n=new Date(); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0'); };

/* ================= تفقيط المبالغ بالعربية ================= */
const _ONES=['','واحد','اثنان','ثلاثة','أربعة','خمسة','ستة','سبعة','ثمانية','تسعة','عشرة','أحد عشر','اثنا عشر','ثلاثة عشر','أربعة عشر','خمسة عشر','ستة عشر','سبعة عشر','ثمانية عشر','تسعة عشر'];
const _TENS=['','عشرة','عشرون','ثلاثون','أربعون','خمسون','ستون','سبعون','ثمانون','تسعون'];
const _HUNDS=['','مائة','مائتان','ثلاثمائة','أربعمائة','خمسمائة','ستمائة','سبعمائة','ثمانمائة','تسعمائة'];
function _threeWords(n){
  n = Math.floor(n); const parts=[];
  const h=Math.floor(n/100), r=n%100;
  if(h) parts.push(_HUNDS[h]);
  if(r){
    if(r<20) parts.push(_ONES[r]);
    else{ const o=r%10, t=Math.floor(r/10); parts.push(o?(_ONES[o]+' و'+_TENS[t]):_TENS[t]); }
  }
  return parts.join(' و');
}
function _scaleWords(n, one, two, few, many){
  if(n===0) return '';
  if(n===1) return one;
  if(n===2) return two;
  if(n<=10) return _threeWords(n)+' '+few;
  return _threeWords(n)+' '+many;
}
function numToArabic(n){
  n = Math.floor(Math.abs(n));
  if(n===0) return 'صفر';
  const parts=[];
  const mil=Math.floor(n/1000000), th=Math.floor((n%1000000)/1000), rest=n%1000;
  if(mil) parts.push(_scaleWords(mil,'مليون','مليونان','ملايين','مليوناً'));
  if(th) parts.push(_scaleWords(th,'ألف','ألفان','آلاف','ألفاً'));
  if(rest) parts.push(_threeWords(rest));
  return parts.join(' و');
}
function tafqeet(amount){
  const dirhams=Math.floor(amount);
  const fils=Math.round((amount-dirhams)*100);
  let s = numToArabic(dirhams)+' درهم';
  if(fils>0) s += ' و'+numToArabic(fils)+' فلساً';
  return s+' لا غير';
}

const collectedOf = (p)=> isArchived(p) ? 0 : (p.status==='مدفوعة' ? (p.amount||0) : (p.status==='مدفوعة جزئياً' ? (p.collectedAmount||0) : 0));
const remainderOf = (p)=> isArchived(p) ? 0 : Math.max(0, (p.amount||0) - collectedOf(p));
/* --- العقد الشامل: قيمة التصميم + قيمة الإشراف معاً --- */
const isComboContract = (c)=> ((c&&c.type)||'').indexOf('شامل')>-1;

const contractTotalOf = (c)=> c.type==='إشراف' ? contractSupTotal(c)
  : isComboContract(c) ? (c.designValue||0) + contractSupTotal(c)
  : (c.value||0);

  if(!c || c.category==='خدمات استشارية' || !c.category) return 0;
  if(c.commissionType==='نسبة %') return (c.value||0)*(c.commissionPct||0)/100;
  if(c.commissionType==='مبلغ ثابت') return (c.commissionAmount||0);
  return 0;
};
const contractHasSupervision = (c)=> (c.type==='إشراف' || isComboContract(c)) && (c.supervisionMonthly||0)>0;

/* ================= الضوابط المالية: Soft Delete + Immutable Documents ================= */
const isArchived = (r)=> r && (r.archived===true || r.cancelled===true);
const paymentIssued = (p)=> p && (p.invoiceNo || p.receiptNo);
/* --- فترة سماح 24 ساعة من لحظة إنشاء السجل: تعديل حر (حتى للمبلغ) والتراجع عن التحصيل --- */

const withinGracePeriod = (r)=> !!(r && r._ts && (Date.now()-r._ts) < GRACE_PERIOD_MS);

const quarterMonths = (qk)=>{ const parts=qk.split('-Q'); const y=parseInt(parts[0],10), q=parseInt(parts[1],10); const s=(q-1)*3+1; return [0,1,2].map(i=> y+'-'+String(s+i).padStart(2,'0')); };
const quarterLabel = (qk)=>{ const ms=quarterMonths(qk); return fmtMonth(ms[0])+' — '+fmtMonth(ms[2]); };
const quarterDueDate = (qk)=>{ const parts=qk.split('-Q'); let y=parseInt(parts[0],10); const q=parseInt(parts[1],10); let m=q*3+1; if(m>12){m-=12;y++;} return y+'-'+String(m).padStart(2,'0')+'-28'; };
const quarterEndDate = (qk)=>{ const ms=quarterMonths(qk); const parts=ms[2].split('-'); const y=parseInt(parts[0],10), m=parseInt(parts[1],10); return y+'-'+String(m).padStart(2,'0')+'-'+new Date(y,m,0).getDate(); };
const listQuarters = ()=>{
  const cur = quarterOfYM(currentYM());
  const cparts=cur.split('-Q'); const cy=parseInt(cparts[0],10), cq=parseInt(cparts[1],10);
  const regQ = quarterOfYM((COMPANY.vatRegDate||'2026-07-01').slice(0,7));
  const rparts=regQ.split('-Q'); let y=parseInt(rparts[0],10), q=parseInt(rparts[1],10);
  const arr=[];
  while(y<cy || (y===cy && q<=cq)){ arr.push(y+'-Q'+q); q++; if(q>4){q=1;y++;} }
  if(arr.length===0) arr.push(cur);
  return arr;
};

/* ================= Migration (from old data model) ================= */
function migrateData(parsed){
  const out = {...parsed};
  if(Array.isArray(parsed.projects)){
    out.projects = parsed.projects.map((p,idx)=>({
      designFee: p.designFee!==undefined ? p.designFee : (p.budget||0),
      supervisionMonthly: p.supervisionMonthly||0,
      supervisionMonths: p.supervisionMonths||0,
      owner: p.owner!==undefined ? p.owner : (p.client||''),
      plotNumber: p.plotNumber||'',
      landType: p.landType || (p.grantNumber ? 'منحة' : 'ملك'),
      ownershipNumber: p.ownershipNumber||'',
      projectNo: p.projectNo || (105+idx),
      emirate: p.emirate||'الشارقة',
      area: p.area||'',
      projectType: p.projectType||'',
      owningEntity: p.owningEntity||'',
      engineer: p.engineer||'',
      timeline: p.timeline||{},
      approvals: p.approvals||{},
      ...p,
    }));
  }
  if(Array.isArray(parsed.invoices) && !Array.isArray(parsed.payments)){
    out.payments = parsed.invoices.map(i=>({
      id:i.id, projectId:i.projectId, phase:'تصميم',
      label:'فاتورة سابقة رقم '+(i.number||'—'),
      amount:i.amount, date:i.date, dueDate:i.dueDate, status:i.status, _ts:i._ts||0,
    }));
  }
  if(Array.isArray(parsed.expenses) && !Array.isArray(parsed.officeExpenses) && !Array.isArray(parsed.projectCosts)){
    out.officeExpenses = parsed.expenses.filter(e=>!e.projectId).map(e=>({...e, category: OFFICE_CATEGORIES.includes(e.category)?e.category:'أخرى'}));
    out.projectCosts = parsed.expenses.filter(e=>e.projectId).map(e=>({...e, category: PROJECT_COST_CATEGORIES.includes(e.category)?e.category:'أخرى'}));
  }
  if(!Array.isArray(out.govFees)) out.govFees = [];
  if(!Array.isArray(out.treasury)) out.treasury = [];
  if(Array.isArray(out.contracts)) out.contracts = out.contracts.map(c=>({category:'خدمات استشارية', ...c}));
  if(!Array.isArray(out.contracts)){
    out.contracts = [];
    (out.projects||[]).forEach(p=>{
      if((p.designFee||0)>0) out.contracts.push({id:'mig-d-'+p.id, projectId:p.id, type:'تصميم واعتماد', description:'أتعاب التصميم واعتماد المخططات', value:p.designFee, date:p.startDate||todayISO(), status: p.status==='منتهٍ'?'منتهٍ':'سارٍ', _ts:1});
      if((p.supervisionMonthly||0)>0) out.contracts.push({id:'mig-s-'+p.id, projectId:p.id, type:'إشراف', description:'الإشراف الهندسي الشهري', supervisionMonthly:p.supervisionMonthly, supervisionMonths:p.supervisionMonths||0, value:(p.supervisionMonthly||0)*(p.supervisionMonths||0), date:p.startDate||todayISO(), status: p.status==='منتهٍ'?'منتهٍ':'سارٍ', _ts:2});
    });
    if(Array.isArray(out.payments)){
      out.payments = out.payments.map(pay=>{
        if(pay.contractId) return pay;
        if(pay.phase==='تصميم') return {...pay, contractId:'mig-d-'+pay.projectId};
        if(pay.phase==='إشراف') return {...pay, contractId:'mig-s-'+pay.projectId};
        return pay;
      });
    }
  }
  if(!Array.isArray(out.decisions)) out.decisions = [];
  if(!Array.isArray(out.auditLog)) out.auditLog = [];
  if(!Array.isArray(out.staffDir)) out.staffDir = [];
  if(typeof out.fccState !== 'object' || out.fccState===null || Array.isArray(out.fccState)) out.fccState = {};
  out.settings = Object.assign({projectsRoot:'D:\\Projects', bankName:'', iban:'', accountName:''}, out.settings||{});
  out.govFees = out.govFees.map(g=>({account:'البنك', ...g}));
  if(Array.isArray(out.officeExpenses)) out.officeExpenses = out.officeExpenses.map(e=>({account:'البنك', ...e}));
  if(Array.isArray(out.projectCosts)) out.projectCosts = out.projectCosts.map(e=>({account:'البنك', ...e}));
  delete out.invoices; delete out.expenses;
  return out;
}

/* ================= بحث عام داخل الجداول ================= */
function rowSearchText(row, data){
  let s = Object.values(row).filter(v=> typeof v==='string' || typeof v==='number').join(' ');
  if(row.projectId){ const p = data.projects.find(x=>x.id===row.projectId); if(p) s += ' '+(p.projectNo||'')+' '+(p.name||'')+' '+(p.owner||'')+' '+(p.plotNumber||'')+' '+(p.ownershipNumber||''); }
  if(row.employeeId){ const e = data.employees.find(x=>x.id===row.employeeId); if(e) s += ' '+(e.name||''); }
  if(row.contractId){ const c = (data.contracts||[]).find(x=>x.id===row.contractId); if(c) s += ' '+(c.type||'')+' '+(c.description||''); }
  return String(s).toLowerCase();
}

function loadScript(srcs){
  return new Promise((resolve, reject)=>{
    const tryNext = (i)=>{
      if(i>=srcs.length){ reject(new Error('cdn failed')); return; }
      const s = document.createElement('script');
      s.src = srcs[i];
      s.onload = ()=>resolve();
      s.onerror = ()=>tryNext(i+1);
      document.head.appendChild(s);
    };
    tryNext(0);
  });
}

const CLOUD_ENTITIES = ['projects','contracts','payments','govFees','officeExpenses','projectCosts','treasury','employees','overtime','advances','cars','decisions','auditLog'];
const ENGINEER_VIEWS = ['projects','contracts','decisions','govFees','cars'];

function recordsToData(rows){
  const d = {projects:[],contracts:[],payments:[],govFees:[],officeExpenses:[],projectCosts:[],treasury:[],employees:[],overtime:[],advances:[],cars:[],decisions:[],auditLog:[],staffDir:[],attendance:{},fccState:{},settings:{projectsRoot:'D:\\Projects', bankName:'', iban:'', accountName:''}};
  rows.forEach(r=>{
    if(r.entity==='settings'){ d.settings = {...d.settings, ...r.data}; return; }
    if(r.entity==='attendance'){ if(r.data && r.data.empId) d.attendance[r.data.empId] = r.data.map||{}; return; }
    if(r.entity==='fccState'){ d.fccState = (r.data && r.data.map)||{}; return; }
    if(r.entity==='staffDir'){ d.staffDir.push({id:r.id, ...r.data}); return; }
    if(CLOUD_ENTITIES.includes(r.entity)) d[r.entity].push(r.data);
  });
  return d;
}
function dataToRows(data){
  const rows = [];
  CLOUD_ENTITIES.forEach(entity=>{
    (data[entity]||[]).forEach(rec=>{ if(rec && rec.id) rows.push({id:String(rec.id), entity, data:rec}); });
  });
  Object.entries(data.attendance||{}).forEach(([empId, map])=>{
    rows.push({id:'att-'+empId, entity:'attendance', data:{empId, map}});
  });
  (data.employees||[]).forEach(e=>{ rows.push({id:'sd-'+e.id, entity:'staffDir', data:{empId:e.id, name:e.name||''}}); });
  rows.push({id:'fccState', entity:'fccState', data:{map:data.fccState||{}}});
  rows.push({id:'settings', entity:'settings', data:data.settings||{}});
  return rows;
}

/* ================= طبقة التخزين: تعمل داخل Claude وخارجه ================= */
const store = {
  async get(key){
    if(typeof window!=='undefined' && window.storage && window.storage.get){
      try{ const r = await window.storage.get(key, false); return r && r.value ? r.value : null; }catch(e){ return null; }
    }
    try{ return window.localStorage ? window.localStorage.getItem(key) : null; }catch(e){ return null; }
  },
  async set(key, val){
    if(typeof window!=='undefined' && window.storage && window.storage.set){
      try{ await window.storage.set(key, val, false); return; }catch(e){}
    }
    try{ if(window.localStorage) window.localStorage.setItem(key, val); }catch(e){}
  },
};

/* ================= Generic Modal Form (يدعم الحقول الشرطية) ================= */
function FormModal({title, fields, initial, onCancel, onSave, data, lockedFields=[], lockedNotice, graceNotice, adminOverrideNotice}){
  const [values, setValues] = useState(()=>{
    const v = {...initial};
    fields.forEach(f=>{ if(v[f.name]===undefined) v[f.name] = ''; });
    fields.forEach(f=>{ if(f.initCompute && (v[f.name]===''||v[f.name]===undefined)) v[f.name] = f.initCompute(v); });
    return v;
  });
  const set = (name,val) => setValues(v=>{
    const nx = {...v, [name]:val};
    const f = fields.find(ff=>ff.name===name);
    if(f && f.sync){ Object.assign(nx, f.sync(nx)); }
    return nx;
  });
  const visible = fields.filter(f=> !f.showIf || f.showIf(values));
  const submit = (e) => {
    e.preventDefault();
    const clean = {...values};
    fields.forEach(f=>{
      if(f.ephemeral){ delete clean[f.name]; return; }
      if(lockedFields.includes(f.name)){ clean[f.name] = initial[f.name]; return; }
      if(f.showIf && !f.showIf(values)){ clean[f.name] = (f.type==='number' ? 0 : ''); return; }
      if(f.type==='number') clean[f.name] = parseFloat(clean[f.name])||0;
    });
    onSave(clean);
  };
  return (
    <div className="overlay" onMouseDown={(e)=>{ if(e.target===e.currentTarget) onCancel(); }}>
      <div className="modal">
        <div className="modal-head">
          <h3>{title}</h3>
          <button className="close-x" onClick={onCancel}>✕</button>
        </div>
        <form onSubmit={submit}>
          <div className="modal-body">
            {lockedNotice && <div style={{padding:'9px 12px', background:'#FEF9F0', borderInlineStart:'3px solid var(--brass)', fontSize:11.5, marginBottom:14, color:'var(--ink-soft)', lineHeight:1.7}}>{lockedNotice}</div>}
            {graceNotice && <div style={{padding:'9px 12px', background:'var(--teal-soft)', borderInlineStart:'3px solid var(--teal)', fontSize:11.5, marginBottom:14, color:'var(--ink)', lineHeight:1.7}}>⏳ {graceNotice}</div>}
            {adminOverrideNotice && <div style={{padding:'9px 12px', background:'var(--blue-soft)', borderInlineStart:'3px solid var(--blue)', fontSize:11.5, marginBottom:14, color:'var(--ink)', lineHeight:1.7}}>🛠 {adminOverrideNotice}</div>}
            {visible.map(f=>{
              const locked = lockedFields.includes(f.name);
              return (
              <div className="field" key={f.name}>
                <label>{f.label}{(typeof f.required==='function' ? f.required(values) : f.required) && ' *'}{locked && <span style={{color:'var(--brass)', marginInlineStart:6, fontSize:10}}>🔒</span>}</label>
                {f.type==='select' ? (
                  <select required={typeof f.required==='function' ? f.required(values) : f.required} disabled={locked} value={values[f.name]||''}
                    onChange={e=>{
                      if(f.allowAddNew && e.target.value==='__ADDNEW__'){
                        const n = prompt(f.addNewPrompt || 'اسم التصنيف الجديد:');
                        if(n===null) return;
                        const nn = n.trim();
                        if(!nn){ alert('التصنيف لا يمكن أن يكون فارغاً'); return; }
                        const opts = (typeof f.options==='function' ? f.options(data, values) : f.options);
                        if(opts.some(o=>String(o.value).trim()===nn)){ alert('هذا التصنيف موجود بالفعل — تم اختياره من القائمة'); }
                        set(f.name, nn); return;
                      }
                      set(f.name, e.target.value);
                    }} style={locked?{background:'#F2F0EA', cursor:'not-allowed'}:{}}>
                    <option value="">اختر...</option>
                    {(typeof f.options==='function' ? f.options(data, values) : f.options).map(o=>(
                      <option key={o.value} value={o.value}>{o.label}</option>
                    ))}
                    {f.allowAddNew && values[f.name] && !(typeof f.options==='function' ? f.options(data, values) : f.options).some(o=>o.value===values[f.name]) && (
                      <option value={values[f.name]}>{values[f.name]} (جديد)</option>
                    )}
                    {f.allowAddNew && <option value="__ADDNEW__">➕ إضافة تصنيف جديد...</option>}
                  </select>
                ) : f.type==='textarea' ? (
                  <textarea rows="3" disabled={locked} value={values[f.name]||''} onChange={e=>set(f.name,e.target.value)} style={locked?{background:'#F2F0EA', cursor:'not-allowed'}:{}} />
                ) : (
                  <input type={f.type||'text'} required={typeof f.required==='function' ? f.required(values) : f.required} disabled={locked} step={f.type==='number' ? '0.01' : undefined}
                    value={values[f.name]===undefined?'':values[f.name]} onChange={e=>set(f.name,e.target.value)} style={locked?{background:'#F2F0EA', cursor:'not-allowed'}:{}} />
                )}
                {f.hint && <div style={{fontSize:11, color:'var(--ink-faint)', marginTop:4}}>{f.hint}</div>}
              </div>
            );})}
          </div>
          <div className="modal-foot">
            <button type="button" className="btn outline" onClick={onCancel}>إلغاء</button>
            <button type="submit" className="btn brass">حفظ</button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ================= Generic Entity View ================= */
function EntityView({config, records, data, onAdd, onUpdate, onDelete, headExtra, rowActions, onRowClick, role}){
  const [modal, setModal] = useState(null);
  const [q, setQ] = useState('');
  const [showArchived, setShowArchived] = useState(false);
  const sorted = useMemo(()=> [...records].sort((a,b)=> (b._ts||0)-(a._ts||0)), [records]);
  const query = q.trim().toLowerCase();
  const archivedCount = sorted.filter(r=>isArchived(r)).length;
  const activeRecords = showArchived ? sorted : sorted.filter(r=>!isArchived(r));
  const filtered = query ? activeRecords.filter(r=> rowSearchText(r, data).includes(query)) : activeRecords;

  return (
    <div>
      <div className="toolbar">
        <div className="section-title" style={{marginBottom:0, flex:1}}>
          <h3>{config.title}</h3>
          <div className="rule"></div>
        </div>
        <input className="searchbox" placeholder={'بحث في '+config.title+'...'} value={q} onChange={e=>setQ(e.target.value)} />
        {archivedCount>0 && (
          <button className="btn ghost small" onClick={()=>setShowArchived(!showArchived)} style={{color:showArchived?'var(--brass)':'var(--ink-faint)'}}>
            {showArchived ? '✓ عرض المؤرشف' : '📦 '+archivedCount+' مؤرشف'}
          </button>
        )}
        {headExtra}
        <button className="btn brass" onClick={()=>setModal({mode:'add'})}>
          <I.plus/> إضافة {config.singular}
        </button>
      </div>
      <div className="card" style={{padding:0}}>
        <div style={{overflowX:'auto'}}>
        <table>
          <thead>
            <tr>
              {config.columns.map(c=>(<th key={c.key}>{c.label}</th>))}
              <th style={{width:120}}></th>
            </tr>
          </thead>
          <tbody>
            {filtered.length===0 && (
              <tr className="empty-row"><td colSpan={config.columns.length+1}>{query ? 'لا نتائج مطابقة للبحث "'+q+'"' : 'لا توجد بيانات بعد — ابدأ بالإضافة'}</td></tr>
            )}
            {filtered.map(row=>(
              <tr key={row.id} onClick={onRowClick ? ()=>onRowClick(row) : undefined} style={{...(onRowClick?{cursor:'pointer'}:{}), ...(isArchived(row)?{opacity:0.5, background:'#F8F6F0'}:{})}}>
                {config.columns.map(c=>{
                  const val = c.render ? c.render(row,data) : row[c.key];
                  return c.truncate
                    ? <td key={c.key} className="cell-clip" title={typeof val==='string' ? val : (row[c.key]||'')}>{val}</td>
                    : <td key={c.key}>{val}</td>;
                })}
                <td onClick={e=>e.stopPropagation()}>
                  <div style={{display:'flex',gap:4}}>
                    {rowActions && rowActions(row)}
                    <button className="btn ghost small" onClick={()=>setModal({mode:'edit', record:row})}><I.edit/></button>
                    {config.allowAdminOverride && role==='owner' && (
                      <button className="btn ghost small" title="تصحيح إداري (مالك فقط) — يفتح كل الحقول للتعديل لمرة واحدة ويُسجَّل في سجل التدقيق"
                        style={{color:'var(--blue)'}}
                        onClick={()=>{
                          const reason = prompt('سبب التصحيح الإداري — إلزامي (يُسجل باسمك في سجل التدقيق):');
                          if(reason===null) return;
                          if(!reason.trim()){ alert('لا يمكن فتح التصحيح الإداري بدون سبب مسجل'); return; }
                          setModal({mode:'adminEdit', record:row, reason:reason.trim()});
                        }}>🛠</button>
                    )}
                    {config.entityKey && protectedFromHardDelete(config.entityKey, row) ? (
                      isArchived(row) ? (
                        <button className="btn ghost small" title="مؤرشف — اضغط لإلغاء الأرشفة" style={{color:'var(--brass)'}}
                          onClick={()=>{ if(confirm('إلغاء أرشفة هذا السجل وإعادته للاستخدام؟')) onUpdate(row.id, {archived:false, cancelled:false, archiveReason:'', archivedAt:''}); }}>📁</button>
                      ) : (
                        <button className="btn ghost small" title="أرشفة / إلغاء (لا يمكن الحذف النهائي)" style={{color:'var(--rust)'}}
                          onClick={()=>{
                            if(config.archiveGuard){
                              const err = config.archiveGuard(row, data);
                              if(err){ alert(err); return; }
                            }
                            const reason = prompt('سبب الأرشفة/الإلغاء — إلزامي (يُسجل في سجل التدقيق):');
                            if(reason===null) return;
                            if(!reason.trim()){ alert('لا يمكن الأرشفة بدون سبب مسجل'); return; }
                            onUpdate(row.id, {archived:true, archiveReason:reason.trim(), archivedAt:todayISO()});
                          }}>📦</button>
                      )
                    ) : (
                      <button className="btn ghost small danger" onClick={()=>{ if(confirm('تأكيد الحذف؟')) onDelete(row.id); }}><I.trash/></button>
                    )}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        </div>
      </div>
      {modal && (
        <FormModal
          title={(modal.mode==='add' ? 'إضافة ' : modal.mode==='adminEdit' ? '🛠 تصحيح إداري — ' : 'تعديل ') + config.singular}
          fields={config.fields}
          initial={modal.record || config.defaults || {}}
          data={data}
          lockedFields={modal.mode==='edit' && config.lockedFor ? config.lockedFor(modal.record) : []}
          lockedNotice={modal.mode==='edit' && config.lockedFor && config.lockedFor(modal.record).length>0 ? config.lockedNotice : null}
          graceNotice={modal.mode==='edit' && config.graceNoticeFor ? config.graceNoticeFor(modal.record) : null}
          adminOverrideNotice={modal.mode==='adminEdit' ? 'هذا تعديل إداري كامل الصلاحية خارج القيود المعتادة (متاح للمالك فقط). كل الحقول مفتوحة، والتغييرات هتتسجل في سجل التدقيق مع السبب اللي كتبته.' : null}
          onCancel={()=>setModal(null)}
          onSave={(vals)=>{
            if(config.validate){
              const err = config.validate(vals, data, modal.mode, modal.record);
              if(err){ alert(err); return; }
            }
            if(modal.mode==='add') onAdd({...vals, id:uid(), _ts:Date.now()});
            else if(modal.mode==='adminEdit') onUpdate(modal.record.id, {...vals, lastCorrectionReason:modal.reason, lastCorrectionAt:new Date().toISOString()});
            else onUpdate(modal.record.id, vals);
            setModal(null);
          }}
        />
      )}
    </div>
  );
}

/* ================= Entity Configs ================= */
function buildConfigs(data){
  const r2 = (x)=> Math.round((parseFloat(x)||0)*100)/100;
  const payF = (v)=> (v.taxable==='غير خاضعة') ? 1 : 1.05;
  const expF = (v)=> v.vatable==='غير خاضع' ? 1 : 1.05;
  const employeeOptions = (d)=> (d.employees&&d.employees.length ? d.employees.map(e=>({value:e.id,label:e.name})) : (d.staffDir||[]).map(s=>({value:s.empId,label:s.name})));
  const projectOptions = (d)=> d.projects.map(p=>({value:p.id, label:(p.projectNo?p.projectNo+' — ':'')+p.name}));
  const empName = (id,d)=> (d.employees.find(e=>e.id===id)||{}).name || '—';
  const projName = (id,d)=> (d.projects.find(p=>p.id===id)||{}).name || '—';
  const contractValue = (p,d)=>{
    const cons = (d.contracts||[]).filter(c=>c.projectId===p.id && c.status!=='ملغى' && !isArchived(c) && (isConsultancy(c)));
    if(cons.length>0) return cons.reduce((s,c)=> s + contractTotalOf(c), 0);
    return (p.designFee||0) + (p.supervisionMonthly||0)*(p.supervisionMonths||0);
  };
  const nextProjectNo = (d)=> Math.max(104, ...d.projects.map(p=>p.projectNo||0)) + 1;

  return {
    projects:{
      title:'المشاريع', singular:'مشروع', entityKey:'projects',
      archiveGuard:(row, d)=>{
        const out = d.payments.filter(i=>i.projectId===row.id).reduce((s,i)=>s+remainderOf(i)*grossFactor(i),0);
        const amanat = d.govFees.filter(g=>!isArchived(g) && g.projectId===row.id && g.payerType!=='المالك مباشرة' && g.paidStatus==='مدفوع' && g.reimburseStatus!=='مسترد').reduce((s,g)=>s+g.amount,0);
        const comm = (d.contracts||[]).filter(c=>!isArchived(c) && c.projectId===row.id && c.category && c.category!=='خدمات استشارية').reduce((s,c)=>{
          const cm = contractCommission(c);
          const inv = d.payments.filter(i=>!isArchived(i) && i.contractId===c.id).reduce((x,i)=>x+i.amount,0);
          return s + Math.max(0, cm-inv);
        },0);
        const probs = [];
        if(out>1) probs.push('ذمم غير محصّلة: '+money(out));
        if(amanat>1) probs.push('أمانات لم تُسترد: '+money(amanat));
        if(comm>1) probs.push('عمولات غير مفوترة: '+money(comm));
        return probs.length ? 'لا يمكن أرشفة المشروع — بنود مالية مفتوحة:\n• '+probs.join('\n• ')+'\n\nاستخدم "قائمة إقفال المشروع" داخل ملف المشروع لمراجعتها.' : null;
      },
      fields:[
        {name:'projectNo', label:'رقم المشروع', type:'number', required:true, hint:'ترقيم تلقائي تسلسلي يبدأ من 105 — كل الفواتير والسندات ستحمل هذا الرقم'},
        {name:'name', label:'اسم المشروع', required:true},
        {name:'owner', label:'اسم المالك', required:true},
        {name:'owningEntity', label:'الجهة المالكة (إن وجدت)'},
        {name:'ownerTrn', label:'الرقم الضريبي للمالك (TRN) — اختياري', hint:'يظهر على الفاتورة الضريبية إذا كان المالك مسجلاً بالضريبة'},
        {name:'landType', label:'نوع الأرض', type:'select', options:[{value:'ملك',label:'ملك'},{value:'منحة',label:'منحة'}], required:true, hint:'أرض الملك لها رقمان (حكومي + ملك) — أرض المنحة لها الرقم الحكومي فقط'},
        {name:'plotNumber', label:'الرقم الحكومي (اختياري)'},
        {name:'ownershipNumber', label:'رقم الأرض (ملك) — اختياري', showIf:v=>v.landType==='ملك'},

/* ================= حساب الرواتب لشهر محدد (يُستخدم في الكشف والتقارير) ================= */
function computePayroll(data, ym){
  const rows = data.employees.map(emp=>{
    const attMap = data.attendance[emp.id] || {};
    const absentDays = Object.entries(attMap).filter(([d,s])=> d.startsWith(ym) && s==='absent').length;
    const dailyRate = emp.baseSalary/30;
    const absenceDeduction = absentDays*dailyRate;
    const ot = data.overtime.filter(o=>o.employeeId===emp.id && monthKey(o.date)===ym)
      .reduce((s,o)=>s+(o.hours||0)*(o.rate||0),0);
    const advances = data.advances.filter(a=>a.employeeId===emp.id && a.type==='سلفة' && monthKey(a.date)===ym)
      .reduce((s,a)=>s+a.amount,0);
    const deductions = data.advances.filter(a=>a.employeeId===emp.id && a.type==='خصم' && monthKey(a.date)===ym)
      .reduce((s,a)=>s+a.amount,0);
    const net = emp.baseSalary - absenceDeduction + ot - advances - deductions;
    return {emp, absentDays, absenceDeduction, ot, advances, deductions, net};
  });
  return {rows, totalNet: rows.reduce((s,r)=>s+r.net,0)};
}

/* ================= مكافأة نهاية الخدمة (تقديري وفق قانون العمل الإماراتي) ================= */
function computeGratuity(emp){
  if(!emp.hireDate) return {years:0, amount:0};
  const years = Math.max(0, (new Date() - new Date(emp.hireDate)) / (365.25*86400000));
  const daily = emp.baseSalary/30;
  let amount = 0;
  if(years < 1){ amount = 0; }
  else if(years <= 5){ amount = daily*21*years; }
  else { amount = daily*21*5 + daily*30*(years-5); }
  return {years, amount};
}

/* ================= حركات النقدية (خزينة + بنك) ================= */
function computeCashFlows(data){
  const flows = [];
  const projName = (id)=> (data.projects.find(p=>p.id===id)||{}).name || '';
  data.payments.forEach(p=>{
    const col = collectedOf(p);
    if(col<=0) return;
    const acc = p.method==='نقداً' ? 'الخزينة' : 'البنك';
    const item = (p.phase==='إشراف' ? ('إشراف '+(p.month?fmtMonth(p.month):'')) : (p.label||'دفعة')) + (p.status==='مدفوعة جزئياً' ? ' (جزئية)' : '');
    flows.push({date:p.paidDate||p.date, desc:'قبض — '+projName(p.projectId)+' — '+item, inAmt:col*grossFactor(p), outAmt:0, account:acc, src:'دفعات استشارية'});
  });
  data.govFees.forEach(g=>{
    if(isArchived(g) || g.payerType==='المالك مباشرة') return;
    const acc = g.account||'البنك';
    if(g.paidStatus==='مدفوع') flows.push({date:g.date, desc:'رسوم حكومية — '+g.department+' — '+projName(g.projectId), inAmt:0, outAmt:g.amount, account:acc, src:'أمانات'});
    if(g.reimburseStatus==='مسترد') flows.push({date:g.date, desc:'استرداد رسوم من المالك — '+projName(g.projectId), inAmt:g.amount, outAmt:0, account:acc, src:'أمانات'});
  });
  data.officeExpenses.forEach(e=>{
    if(e.payStatus!=='معلق') flows.push({date:e.date, desc:'مصروف مكتب — '+e.category, inAmt:0, outAmt:expGross(e), account:e.account||'البنك', src:'مصروفات'});
  });
  data.projectCosts.forEach(e=>{
    flows.push({date:e.date, desc:'تكلفة مشروع — '+e.category+' — '+projName(e.projectId), inAmt:0, outAmt:expGross(e), account:e.account||'البنك', src:'مصروفات'});
  });
  data.treasury.forEach(t=>{
    if(t.type==='قبض') flows.push({date:t.date, desc:t.note||'قبض يدوي', inAmt:t.amount, outAmt:0, account:t.account, src:'يدوي'});
    else if(t.type==='صرف') flows.push({date:t.date, desc:t.note||'صرف يدوي', inAmt:0, outAmt:t.amount, account:t.account, src:'يدوي'});
    else if(t.type==='تحويل'){
      flows.push({date:t.date, desc:'تحويل إلى '+(t.toAccount||''), inAmt:0, outAmt:t.amount, account:t.account, src:'تحويل'});
      flows.push({date:t.date, desc:'تحويل من '+t.account, inAmt:t.amount, outAmt:0, account:t.toAccount||'البنك', src:'تحويل'});
    }
  });
  flows.sort((a,b)=> (b.date||'').localeCompare(a.date||''));
  const bal = (acc)=> flows.filter(f=>f.account===acc).reduce((s,f)=>s+f.inAmt-f.outAmt,0);
  return {flows, bank:bal('البنك'), cash:bal('الخزينة')};
}

/* ================= Dues View (الذمم — مدينون ودائنون) ================= */
function DuesView({data}){
  const receivables = data.projects.map(p=>{
    const duePays = data.payments.filter(i=>!isArchived(i) && i.projectId===p.id).reduce((s,i)=>s+remainderOf(i)*grossFactor(i),0);
    const feesOut = data.govFees.filter(g=>g.projectId===p.id && !isArchived(g) && g.payerType!=='المالك مباشرة' && g.paidStatus==='مدفوع' && g.reimburseStatus!=='مسترد').reduce((s,g)=>s+(isArchived(g)?0:g.amount),0);
    return {...p, duePays, feesOut, total:duePays+feesOut};
  }).filter(r=>r.total>0).sort((a,b)=>b.total-a.total);
  const totalRecv = receivables.reduce((s,r)=>s+r.total,0);

  const unpaidFees = data.govFees.filter(g=>!isArchived(g) && g.payerType!=='المالك مباشرة' && g.paidStatus!=='مدفوع');
  const feesByDept = {};
  unpaidFees.forEach(g=>{ feesByDept[g.department] = (feesByDept[g.department]||0) + g.amount; });

  const quarters = listQuarters();
  const doneQuarters = quarters.filter(q=> quarterEndDate(q) < todayISO());
  const lastQ = doneQuarters[doneQuarters.length-1];
  let vatDue = 0;
  if(lastQ){
    const ms = quarterMonths(lastQ);
    const outV = data.payments.filter(i=>!isArchived(i) && ms.includes(monthKey(i.date))).reduce((s,i)=>s+(isArchived(i)?0:i.amount*vatRateOf(i)),0);
    const inV = [...data.officeExpenses, ...data.projectCosts].filter(e=>ms.includes(monthKey(e.date))).reduce((s,e)=>s+e.amount*0.05,0);
    vatDue = outV - inV;
  }
  const totalPay = Object.values(feesByDept).reduce((s,v)=>s+v,0) + Math.max(0,vatDue);

  return (
    <div>
      <div className="grid grid-3" style={{marginBottom:18}}>
        <div className="card"><div className="kpi-label">مدينون — مستحق لك</div><div className="kpi-value" style={{color:'var(--teal)'}}>{money(totalRecv)}</div><div className="kpi-note">دفعات غير محصلة + أمانات لم تُسترد</div></div>
        <div className="card"><div className="kpi-label">دائنون — مستحق عليك</div><div className="kpi-value" style={{color:'var(--rust)'}}>{money(totalPay)}</div><div className="kpi-note">رسوم للدوائر + ضريبة مستحقة</div></div>
        <div className="card"><div className="kpi-label">صافي المركز</div><div className="kpi-value" style={{color:(totalRecv-totalPay)>=0?'var(--teal)':'var(--rust)'}}>{money(totalRecv-totalPay)}</div><div className="kpi-note">مدينون − دائنون</div></div>
      </div>

      <div className="section-title"><h3 style={{fontSize:13.5}}>أعمار الذمم المدينة — حسب تاريخ الاستحقاق</h3><div className="rule"></div></div>
      <div className="card" style={{padding:0, marginBottom:24}}>
        <div style={{overflowX:'auto'}}>
        <table>
          <thead><tr><th>المالك</th><th>المشروع</th><th>البند</th><th>المبلغ المتبقي</th><th>الاستحقاق</th><th>العمر</th></tr></thead>
          <tbody>
            {(()=>{
              const rows = data.payments.filter(i=>remainderOf(i)>0 && i.dueDate).map(i=>{
                const p = data.projects.find(x=>x.id===i.projectId)||{};
                const age = -(daysUntil(i.dueDate)||0);
                const bucket = age<=0 ? 'لم يستحق بعد' : age<=30 ? '0-30 يوم' : age<=60 ? '31-60 يوم' : age<=90 ? '61-90 يوم' : 'أكثر من 90 يوم';
                const cls = age<=0 ? 'gray' : age<=30 ? 'ok' : age<=60 ? 'soon' : 'bad';
                return {i, p, age, bucket, cls};
              }).sort((a,b)=>b.age-a.age);
              if(rows.length===0) return <tr className="empty-row"><td colSpan={6}>لا توجد ذمم مستحقة</td></tr>;
              return rows.map(({i,p,age,bucket,cls})=>(
                <tr key={i.id}>
                  <td>{p.owner||'—'}</td>
                  <td>{(p.projectNo?p.projectNo+' — ':'')+(p.name||'')}</td>
                  <td>{i.phase==='إشراف' ? ('إشراف '+(i.month?fmtMonth(i.month):'')) : (i.label||'—')}</td>
                  <td style={{fontWeight:700}}>{money(remainderOf(i)*grossFactor(i))}</td>
                  <td>{i.dueDate}</td>
                  <td><span className={"badge "+cls}>{bucket}{age>0?' ('+age+' يوم)':''}</span></td>
                </tr>
              ));
            })()}
          </tbody>
        </table>
        </div>
      </div>

      <div className="section-title"><h3 style={{fontSize:13.5}}>مدينون — من يدين لك (حسب المالك / المشروع)</h3><div className="rule"></div></div>
      <div className="card" style={{padding:0, marginBottom:24}}>
        <table>
          <thead><tr><th>المشروع</th><th>المالك</th><th>دفعات مستحقة (شاملة الضريبة)</th><th>أمانات لم تُسترد</th><th>الإجمالي</th></tr></thead>
          <tbody>
            {receivables.length===0 && <tr className="empty-row"><td colSpan={5}>لا توجد ذمم مدينة — كل المستحقات محصلة</td></tr>}
            {receivables.map(r=>(
              <tr key={r.id}>
                <td>{(r.projectNo?r.projectNo+' — ':'')+r.name}</td>
                <td>{r.owner||'—'}</td>
                <td>{money(r.duePays)}</td>
                <td>{money(r.feesOut)}</td>

      <div className="section-title"><h3 style={{fontSize:13.5}}>دائنون — ما يستحق عليك</h3><div className="rule"></div></div>

/* ================= Payments View (مع شريط ملخص وفلتر وسندات قبض) ================= */
function PaymentsView({data, configs, mutate, lockedProject, role}){
  const [filterProjState, setFilterProj] = useState('');
  const [settleFor, setSettleFor] = useState(null);
  const [bulkOpen, setBulkOpen] = useState(false);
  const filterProj = lockedProject || filterProjState;
  const [receiptFor, setReceiptFor] = useState(null);
  const [invoiceFor, setInvoiceFor] = useState(null);
  const m = mutate('payments');
  const records = filterProj ? data.payments.filter(p=>p.projectId===filterProj) : data.payments;

  if(receiptFor){
    const pay = data.payments.find(p=>p.id===receiptFor);
    if(pay){
      const proj = data.projects.find(p=>p.id===pay.projectId);
      return <ReceiptDoc payment={pay} project={proj} onBack={()=>setReceiptFor(null)} />;
    }
  }
  if(invoiceFor){
    const pay = data.payments.find(p=>p.id===invoiceFor);
    if(pay){
      const proj = data.projects.find(p=>p.id===pay.projectId);
      return <InvoiceDoc payment={pay} project={proj} settings={data.settings} onBack={()=>setInvoiceFor(null)} />;
    }
  }

  const generateSupervision = () => {
    const ym = currentYM();
    const targets = (data.contracts||[]).filter(c=>{
      if(!contractHasSupervision(c) || c.status!=='سارٍ' || (c.category && c.category!=='خدمات استشارية')) return false;
      const proj = data.projects.find(p=>p.id===c.projectId);
      if(!proj || proj.status!=='جارٍ' || !projectReadyForSupervision(proj)) return false;
      const done = data.payments.filter(i=>!isArchived(i) && i.contractId===c.id && i.phase==='إشراف').length;
      if(done >= (c.supervisionMonths||0)) return false;
      return !data.payments.some(i=>!isArchived(i) && i.contractId===c.id && i.phase==='إشراف' && i.month===ym);
    });
    if(targets.length===0){ alert('لا توجد دفعات إشراف مطلوب توليدها لشهر '+fmtMonth(ym)); return; }
    const due = new Date(); due.setDate(due.getDate()+10);
    targets.forEach(c=>{
      m.add({id:uid(), projectId:c.projectId, contractId:c.id, phase:'إشراف', month:ym, amount:c.supervisionMonthly,
        date:todayISO(), dueDate:due.toISOString().slice(0,10), status:'معلقة', _ts:Date.now()});
    });
    alert('تم توليد '+targets.length+' دفعة إشراف لشهر '+fmtMonth(ym)+' بحالة معلقة');
  };

  const docSeq = (row, field, prefix) => {
    const proj = data.projects.find(p=>p.id===row.projectId);
    const pno = proj ? proj.projectNo : 0;
    const pre = prefix+'-'+pno+'-';
    const maxNo = data.payments.reduce((mx,p)=>{
      if(!(p[field]||'').startsWith(pre)) return mx;
      return Math.max(mx, parseInt((p[field]||'').slice(pre.length))||0);
    }, 0);
    return pre + String(maxNo+1).padStart(3,'0');
  };
  const takeSnapshot = (row)=>{
    if(row.docSnapshot) return {};
    const proj = data.projects.find(p=>p.id===row.projectId) || {};
    return {docSnapshot:{owner:proj.owner||'', ownerTrn:proj.ownerTrn||'', projectName:proj.name||'', plotNumber:proj.plotNumber||'', projectNo:proj.projectNo||'', issuedAt:todayISO()}};
  };
  const openReceipt = (row) => {
    if(!row.receiptNo) m.update(row.id, {receiptNo: docSeq(row, 'receiptNo', 'RCP'), ...takeSnapshot(row)});
    setReceiptFor(row.id);
  };
  const openInvoice = (row) => {
    if(!row.invoiceNo) m.update(row.id, {invoiceNo: docSeq(row, 'invoiceNo', 'INV'), ...takeSnapshot(row)});
    setInvoiceFor(row.id);
  };

  const designTotal = records.filter(p=>p.phase==='تصميم').reduce((s,p)=>s+p.amount,0);
  const supervTotal = records.filter(p=>p.phase==='إشراف').reduce((s,p)=>s+p.amount,0);
  const otherTotal = records.filter(p=>p.phase==='أخرى').reduce((s,p)=>s+p.amount,0);
  const unpaid = records.reduce((s,p)=>s+remainderOf(p)*grossFactor(p),0);

  return (
    <div>
      <div className="grid grid-4" style={{marginBottom:18}}>
        <div className="card">
          <div className="kpi-label">دفعات التصميم والاعتماد</div>
          <div className="kpi-value" style={{fontSize:19}}>{money(designTotal)}</div>
          <div className="kpi-note">المرحلة الأولى — قبل الضريبة</div>
        </div>
        <div className="card">
          <div className="kpi-label">دفعات الإشراف الشهري</div>
          <div className="kpi-value" style={{fontSize:19}}>{money(supervTotal)}</div>
          <div className="kpi-note">المرحلة الثانية — قبل الضريبة</div>
        </div>
        <div className="card">
          <div className="kpi-label">رسوم أخرى خاضعة للضريبة</div>
          <div className="kpi-value" style={{fontSize:19}}>{money(otherTotal)}</div>
          <div className="kpi-note">فحوصات وخدمات خارجية</div>
        </div>
        <div className="card">
          <div className="kpi-label">مستحقات غير محصلة</div>
          <div className="kpi-value" style={{fontSize:19, color:unpaid>0?'var(--rust)':'var(--teal)'}}>{money(unpaid)}</div>
          <div className="kpi-note">شاملة الضريبة — معلقة أو متأخرة</div>
        </div>
      </div>
      {settleFor && <SettlePaymentModal payment={settleFor} mutate={mutate} onClose={()=>setSettleFor(null)} />}
      {bulkOpen && <BulkSettleModal data={data} mutate={mutate} presetProject={lockedProject||filterProj||''} onClose={()=>setBulkOpen(false)} />}
      <EntityView config={lockedProject ? {...configs.payments, defaults:{...configs.payments.defaults, projectId:lockedProject}} : configs.payments} records={records} data={data}
        onAdd={m.add} onUpdate={m.update} onDelete={m.del} role={role}
        rowActions={(row)=>(
          <React.Fragment>
            <button className="btn ghost small" title="فاتورة ضريبية" onClick={()=>openInvoice(row)}><I.docfile/></button>
            {row.status!=='مدفوعة' && !isArchived(row) && (
              <button className="btn ghost small" title="تسجيل تحصيل" style={{color:'var(--teal)'}} onClick={()=>setSettleFor(row)}>💰</button>
            )}
            {(row.status==='مدفوعة'||row.status==='مدفوعة جزئياً') && (
              <button className="btn ghost small" title="سند قبض" onClick={()=>openReceipt(row)}><I.print/></button>
            )}
            {(row.status==='مدفوعة'||row.status==='مدفوعة جزئياً') && !isArchived(row) && withinGracePeriod(row) && (
              <button className="btn ghost small" title={'تراجع عن التحصيل (متاح لمدة '+graceHoursLeft(row)+' ساعة أخرى — فترة سماح 24 ساعة من الإنشاء)'} style={{color:'var(--rust)'}}
                onClick={()=>{
                  if(!confirm('التراجع عن التحصيل سيعيد الدفعة إلى "معلقة" ويصفّر بيانات السداد (التاريخ/الطريقة/المرجع). العملية تُسجَّل في سجل التدقيق. متابعة؟')) return;
                  m.update(row.id, {status:'معلقة', collectedAmount:0, paidDate:'', method:'', refNo:''});
                }}>↺</button>
            )}
          </React.Fragment>
        )}
        headExtra={
          <React.Fragment>
            <button className="btn outline" onClick={generateSupervision}>توليد دفعات إشراف {fmtMonth(currentYM())}</button>
            <button className="btn outline" onClick={()=>setBulkOpen(true)}>💰 تحصيل مجمّع</button>
            {lockedProject ? null : <select value={filterProj} onChange={e=>setFilterProj(e.target.value)}
              style={{border:'1px solid var(--line-strong)', borderRadius:4, padding:'7px 10px', fontSize:12.5, background:'#fff'}}>
              <option value="">كل المشاريع</option>

/* ================= Attendance View ================= */
const ATT_STATES = [null,'present','absent','leave','late'];
const ATT_MARK = {present:'ح', absent:'غ', leave:'إ', late:'ت'};
function AttendanceView({data, setAttendance}){
  const [ym, setYm] = useState(currentYM());
  const [year, month] = ym.split('-').map(Number);
  const daysInMonth = new Date(year, month, 0).getDate();
  const days = Array.from({length:daysInMonth}, (_,i)=>i+1);

  const cycle = (empId, day) => {
    const dateStr = ym+'-'+String(day).padStart(2,'0');
    const cur = (data.attendance[empId]||{})[dateStr] || null;
    const idx = ATT_STATES.indexOf(cur);
    const next = ATT_STATES[(idx+1)%ATT_STATES.length];
    setAttendance(empId, dateStr, next);
  };

  return (
    <div>
      <div className="toolbar">
        <div className="section-title" style={{marginBottom:0, flex:1}}>
          <h3>الحضور والانصراف</h3>
          <div className="rule"></div>
        </div>
        <input type="month" value={ym} onChange={e=>setYm(e.target.value)} />
      </div>
      <div className="card" style={{padding:16}}>
        <p style={{fontSize:12.5, color:'var(--ink-soft)', marginBottom:14}}>انقر على أي خلية للتبديل بين: حاضر ← غائب ← إجازة ← متأخر ← فارغ</p>
        <div className="att-grid">
          <table className="att-table">
            <thead>
              <tr>
                <th className="att-name-col">الموظف</th>
                {days.map(d=>(<th key={d} style={{minWidth:26}}>{d}</th>))}
              </tr>
            </thead>
            <tbody>
              {data.employees.map(emp=>(
                <tr key={emp.id}>
                  <td className="att-name-col">{emp.name}</td>
                  {days.map(d=>{
                    const dateStr = ym+'-'+String(d).padStart(2,'0');
                    const st = (data.attendance[emp.id]||{})[dateStr] || null;
                    return (
                      <td key={d} className={"att-cell "+(st||'empty')} onClick={()=>cycle(emp.id,d)}>
                        {st ? ATT_MARK[st] : ''}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="legend">
          <span><i style={{background:'var(--teal-soft)'}}></i> حاضر</span>
          <span><i style={{background:'var(--rust-soft)'}}></i> غائب</span>
          <span><i style={{background:'var(--blue-soft)'}}></i> إجازة</span>
          <span><i style={{background:'var(--amber-soft)'}}></i> متأخر</span>
        </div>
      </div>
    </div>
  );
}

/* ================= VAT View (ربع سنوي وفق شهادة الهيئة) ================= */
function VatView({data}){
  const quarters = listQuarters();
  const [qk, setQk] = useState(quarters[quarters.length-1]);
  const months = quarterMonths(qk);
  const payIn = data.payments.filter(i=>months.includes(monthKey(i.date)));
  const expIn = [...data.officeExpenses, ...data.projectCosts].filter(e=>months.includes(monthKey(e.date)));
  const outputVat = payIn.reduce((s,i)=>s+(isArchived(i)?0:i.amount*vatRateOf(i)),0);
  const inputVat = expIn.reduce((s,e)=>s+(isArchived(e)?0:(e.amount||0)*expVatRate(e)),0);
  const net = outputVat - inputVat;
  const due = quarterDueDate(qk);
  const dd = daysUntil(due);
  const ended = quarterEndDate(qk) < todayISO();
  return (
    <div>
      <div className="toolbar">
        <div className="section-title" style={{marginBottom:0, flex:1}}><h3>ضريبة القيمة المضافة — فترات ربع سنوية</h3><div className="rule"></div></div>
        <select value={qk} onChange={e=>setQk(e.target.value)}
          style={{border:'1px solid var(--line-strong)', borderRadius:4, padding:'7px 10px', fontSize:12.5, background:'#fff'}}>
          {quarters.map(q=><option key={q} value={q}>{quarterLabel(q)}</option>)}
        </select>
      </div>
      <div className="grid grid-4" style={{marginBottom:18}}>
        <div className="card">
          <div className="kpi-label">ضريبة المخرجات</div>
          <div className="kpi-value" style={{fontSize:19, color:'var(--teal)'}}>{money(outputVat)}</div>
          <div className="kpi-note">{payIn.length} دفعة استشارية خلال الفترة</div>
        </div>
        <div className="card">
          <div className="kpi-label">ضريبة المدخلات</div>
          <div className="kpi-value" style={{fontSize:19, color:'var(--blue)'}}>{money(inputVat)}</div>
          <div className="kpi-note">{expIn.length} سجل — يُحتسب الخاضع فقط، وبشرط فاتورة ضريبية سارية من المورد</div>
        </div>
        <div className="card">
          <div className="kpi-label">صافي الضريبة</div>
          <div className="kpi-value" style={{fontSize:19, color:net>=0?'var(--rust)':'var(--teal)'}}>{money(Math.abs(net))}</div>
          <div className="kpi-note">{net>=0 ? 'مستحقة للهيئة' : 'مستردة لصالح الشركة'}</div>
        </div>
        <div className="card">
          <div className="kpi-label">استحقاق الإقرار</div>
          <div className="kpi-value" style={{fontSize:19}}>{due}</div>
          <div className="kpi-note">
            {ended
              ? (dd!==null && dd<0 ? <span className="badge bad">تجاوز الاستحقاق بـ {Math.abs(dd)} يوم</span> : <span className={"badge "+(dd<=15?'soon':'ok')}>متبقي {dd} يوم للتقديم</span>)
              : <span className="badge gray">الفترة لم تنتهِ بعد</span>}
          </div>
        </div>
      </div>
      <p style={{fontSize:12, color:'var(--ink-faint)'}}>* الفترات الضريبية ربع سنوية وفق شهادة التسجيل الرسمية (TRN: {COMPANY.trn}) — تاريخ التسجيل الفعلي {COMPANY.vatRegDate}، وأول فترة إقرار {quarterLabel(quarterOfYM(COMPANY.vatRegDate.slice(0,7)))} مستحقة في {quarterDueDate(quarterOfYM(COMPANY.vatRegDate.slice(0,7)))}. أي دفعة تاريخها قبل هذا التاريخ لا تظهر هنا لأنها خارج نطاق التسجيل قانوناً، حتى لو كانت شاملة نسبة ضريبة على السعر. الرسوم الحكومية (الأمانات) مستثناة بالكامل من الحساب. يُنصح بمراجعة محاسب مختص قبل التقديم عبر بوابة الهيئة.</p>
    </div>
  );
}
